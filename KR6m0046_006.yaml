body:
  text: 明匡山沙門憨山釋德清述搜玄第六此承無名言涅槃之道妙出有無故名家搜之搜尋求也有名曰論自云涅槃既不出有無又不在有無引論意不在有無則不可於有無得之矣不出有無則不可離有無求之矣求之無所便應都無此名家按蹟興疑也上云良以有無之數等是不出有無也前云果出有無等是不在有無也以不在故不可即而得之矣不出則不可離而求之矣於即離之間求之而所求不可得便應都無豈以斷滅為妙道乎然復不無其道其道不無則幽途可尋所以千聖同轍未嘗虗返者也其道既存而曰不出不在必有異旨可得聞乎既云不出不在然又不無其道是則妙道可尋足知千聖一軌同歸一極未嘗虗返者也然其道既存則有所可指而曰不出不在使人趣向無所必有異旨可得聞乎妙存第七不出不在曰妙體非斷絕曰存乃無住之深趣存乎不即不離之間故曰妙存雖云妙存正顯無住無名曰夫言由名起名以相生相因可相無相無名無名無說無說無聞此意責名家執名相以求無言之妙道故就有無以求之非得無言之旨也謂凡言說從名相而起名相從妄想而生故曰相因可相若名相兩忘則言說俱無言說既無則從何所聞然此涅槃妙道本無言說子於何而得聞乎經曰涅槃非法故不在非非法故不出無聞無說非心所知吾何敢言之而子欲聞之耶此正申責意也由名象家云不出不在必有異旨可得聞乎故此引經證涅槃本不可說亦非可聞也經即本經二十一略云涅槃非相非不相非物非不物等亦淨名義謂有無二者皆名為法所云非法則不在也非非法則不出也不出不在則無言說離言之道非心所知吾何敢妄言而子欲聞之耶雖然善吉有言眾人若能以無心而受無聽而聽者吾當以無言言之庶述其言亦可以言此陳道本無言亦可以因言顯道也善吉須菩提之名也義引般若須菩提云我觀般若本無言說若眾人能以無心而受無聽而聽者我當述佛之言亦可以言之意欲通難解迷不得不言之耳淨名曰不離煩惱而得涅槃天女曰不出魔界而入佛界此引二經證不出不在義也淨名即弟子品文天女即寶女所問經第四偈曰如魔之境界佛境界平等相應為一類以是印見印據此經義妙道本來不出不在只在當人妙悟豈可執言求實也故下明妙悟然則玄道在於妙悟妙悟在於即真即真即有無齊觀齊觀即彼己莫二所以天地與我同根萬物與我一體同我則非復有無異我則乖於會通所以不出不在而道存乎其間矣此言涅槃妙道在乎妙悟等觀非言說可到也所言涅槃者乃法身寂滅之稱也大經云法身徧在一切處一切眾生及國土三世悉在無有餘亦無形相而可得此非妙悟不足以了達然妙悟要在即物以見真即真要在有無齊觀若能齊觀則物我不二如此則天地與我同根萬物與我一體若物我等觀則不落有無若物與我異心境角立則不能會通故所以言不出不在而妙存乎其間矣若不如此則取捨情生是非繆亂又何以見忘言之道乎何則徵釋妙悟夫至人虗心冥照理無不統懷六合於胸中而靈鑒有餘鏡萬有於方寸而其神常虗此言聖人照理達事故即事而真也由照真理極故事無不攝故懷六合而有餘鏡萬有而常虗此聖人之心也至能拔言證窮也玄根指涅槃實際也於未始言無始指未迷已前即羣動以靜心恬淡淵默玅契自然言由妙悟故能真窮惑盡破無始之迷徹法界之理故權應羣機即動而常靜無為湛寂妙契自然所以處有不有居無不無居無不無故不無於無處有不有故不有於有故能不出有無而不在有無者也此言聖人理極情亡故出在兩超不墮有無之見也由實智理窮故處有不有權應無方故居無不無以不無故不滯於無不有故不著於有如此所以不出有無而不在有無者也豈可以一定於有無而求之哉然則法無有無之相境空聖無有無之知心空聖無有無之知則無心於內亡知絕照法無有無之相則無數名相也於外離名絕相於外無數則境絕於內無心則智絕彼境也此心也寂滅心境雙絕物我冥一物我如如怕爾無朕乃曰涅槃此歎聖人心境雙絕物我如如纖塵不立乃曰涅槃此為聖人之極證究竟涅槃之果也涅槃若此圖度絕矣豈容可責之於有無之內又可徵之有無之外耶此責迷也謂涅槃如此超出思議圖度之境豈容可以有無內外而求之耶難差第八此承上言涅槃之道心境不二物我一如之妙是為平等無二之理如此何以三乘修證有差既曰冥一則不應有三有名曰涅槃既絕圖度之域則超六境之外不出不在而玄道獨存斯則窮理盡性究竟之道妙一無差理其然矣名家敘領涅槃超出有無之妙為窮理盡性之談理其然矣但理既一而三乘所證何以不同故此下立難而放光云三乘之道皆因無為而有差別佛言我昔為菩薩時名曰儒童於然燈佛所已入涅槃儒童菩薩時於七住初獲無生忍進修三位難意謂涅槃妙道既是一則三乘所證不應有差引放光義金剛亦同謂一切聖賢皆以無為法而有差別所謂證異也儒童於然燈佛所已入涅槃而又云時於七住獲無生法忍圓教七住即權教七地故言既入涅槃則已證極果如何後又進修三位耶此疑涅槃未為極證也此引證意下正難若涅槃一也則不應有三如其有三則非究竟究竟之道而有升降之殊眾經異說何以取中耶此正難差也若一則不應有三有三則非究竟矣既曰究竟之道而有升降之不同教有明言又何以折中耶辯差第九無名曰然究竟之道理無差也法華經云第一大道無有兩正吾以方便為怠慢者於一乘道分別說三三車出火宅即其事也此領難意理本一也然有三乘者乃即一之三權實之義耳正法華云是一乘道寂然之地無有二上論正與經上皆極果也妙法華云佛為求道者中路懈廢為止息故以方便力於一乘道分別說三火宅喻先許三車及諸子出宅皆等賜一大車是則本無有三三非實法也以俱出生死故同稱無為所乘不一故有三名統其會歸一而已矣此言三乘會歸一極以申答意也而難云三乘之道皆因無為而有差別此以人三三於無為非無為有三也故放光云涅槃有差別耶答曰無差別但如來結習都盡聲聞結習不盡耳此正答難意但人有三而涅槃之道本無三也所以有差者但如來煩惱無明結習已盡三乘未盡故有差耳以結習盡處心契無為名為涅槃故下以喻明請以近喻以況遠旨如人斬木去尺無尺去寸無寸脩短在於尺寸不在無也此喻最顯言無無長短意旨更妙此法本不異夫以羣生萬端識根不一智鑒有淺深德行有厚薄所以俱之彼岸而升降不同彼岸豈異異自我耳然則眾經殊辯其致不乖此明法本不異異在於機智有淺深德有厚薄正不一之所以也彼岸豈異正示法一眾經隨機之說故不乖耳責異第十謂無為之理既一如何能證之人有三蓋躡前致難也故云責異有名曰俱出火宅則無患一也同出生死則無為一也此領旨也而云彼岸無異異自我耳此興疑也彼岸則無為岸也我則體證也無為者也立難意下申難請問我與無為為一為異若我即無為無為亦即我不得言無為無異異自我也言我與無為既一則無彼此之分故不可言異自於我若我異無為我則非無為我是眾生自屬有為故非無為無為自無為自一向無為我自常有為我在生死則一向有為冥會之致又滯而不通無為有為條然各別故難通會然則我與無為一亦無三若生死涅槃本來平等一際如此既一則畢竟無三異亦無三若生死與涅槃本來不同則生死自生死涅槃自涅槃何有三乘之設三乘之名何由而生也進退推之一亦無三異亦無三如此則三乘之名何由而生耶會異第十一名家執異以難非一故無名會通無二無名曰夫止此而此意謂迷時涅槃即生死適彼而彼悟時生死即涅槃所以同於得者得亦得之證則三乘同證同於失者失亦失之迷則六道同迷我適無為我即無為無為雖一何乖不一耶此言生死涅槃本無二致迷悟同源以人證法法則在人故曰我適無為我即無為人大則法亦隨大機小則法亦隨小是則無為雖一何妨因人而有三耶譬猶三鳥出網同適無患之域無患雖同而鳥鳥各異不可以鳥鳥各異謂無患亦異又不可以無患既一而一於眾鳥也然則鳥即無患無患即鳥無患豈異異自鳥耳此喻顯法一而人異也鳥喻眾生網喻生死無患喻涅槃謂眾鳥出網無患一而鳥鳥異異謂飛有遠近也此以無患喻涅槃最妙如是三乘眾生俱越妄想之樊同適無為之境無為雖同而乘乘各異不可以乘乘各異謂無為亦異又不可以無為既一而一於三乘也然則我即無為無為即我無為豈異異自我耳法合甚明謂眾生同出生死所證涅槃是一但根有大小智有淺深故證有高下此是異在人不在法也所以無患雖同而升虗有遠近無為雖一而幽鑒有淺深無為即乘也乘即無為也此非我異無為以未盡無為故有三耳此喻法雙結生死涅槃本來不二但出生死之人未盡無為之理故有三乘之分非有三法以待人也此論正義特顯生死涅槃不二之旨學人不可以迷悟三一求之詰漸第十二詰難也由前云未盡有三是為漸義故此詰之有名曰萬累滋彰本於妄想妄想既祛則萬累都息此言三乘斷惑同二乘得盡智菩薩得無生智此言三乘智同是時妄想都盡結縛永除結縛既除則心無為此言三乘證理同心既無為理無餘翳此詰三乘斷惑證智證理皆同同則不應取果有異也萬累指枝末煩惱妄想指根本煩惱根本既斷則枝末不生故云都息二乘盡智等新疏引大品說三乘之人共十一智第九名盡智謂苦已盡見等第十名無生智謂苦已見而不更見等則前之十智聲聞皆有盡智在已辦地得之今云菩薩得無生智者二地已上第九菩薩地阿䟦致如實知諸法本自不生今亦無滅名無生智不共二乘也上引聲聞亦證無生今言菩薩不共者以二乘但盡生死名為無生菩薩乃達諸法寂滅無生故不共耳通言三乘斷惑證理皆同而取果不應有異此乃名家約義以難其實三乘斷惑不同以二乘斷見思菩薩斷塵沙伏無明霄壤有異豈可同哉學者不可不知也經曰是諸聖智不相違背不出不在應作生字其實俱空又曰無為大道平等不二此引證三乘證理不異也疏引放光云聲聞辟支佛菩薩佛世尊是諸聖智不相違背乃至云不出不在其實空者無有差殊今在字宜是生字智論解云因邊不起名為不出緣邊不起名為不生又曰下亦義引大品三慧品須菩提白佛言世尊無為法中可得差別不佛言不也故義言大道平等無二既曰無二則不容心異不體證也則已體應窮微而曰體而未盡是所未悟也言既所證之理不二則能證之心又何容異以不異之心證不二之理不證則已證則窮微徹底而曰體而未盡是所未悟也明漸第十三言結習不可頓盡無為不可頓證譬如磨鏡垢盡明現無名曰無為無二則已然矣領難理無差結是重惑可謂頓盡亦所未喻經云理須頓悟乘悟併消事因漸除因次第盡經曰三箭中的三獸渡河中渡無異而有淺深之殊者為力不同故也二喻疏引毗婆沙論之義云猶如一的若木若鐵眾箭所中一無為體為三想所行又云於甚深十二因緣河能盡其底是名為佛二乘不爾如三獸渡河謂象馬兔兔則騰擲而渡馬或盡底或不盡底香象於一切時無不盡底三乘眾生俱濟緣起之津同鑒四諦之的絕偽即真同升無為然則所乘不一者亦以智力不同故也此法合也緣起十二因緣乃廣四諦而說故四諦有生滅無生無作無量四種不同故是三乘同觀故云俱濟同鑒而斷惑證真同升無為亦各證自乘故所乘不一亦以智力不同故也下舉例難盡夫羣有雖眾然其量有涯正使智猶身子辯若滿願窮才極慮莫窺其畔此舉有為之法難盡以例無為不可頓窮也言萬物難多各有涯量直使智慧如身子辯才如滿慈窮其才極其慮亦莫能窺其邊有為如此況無為乎涅槃云佛言我與彌勒等共論世諦舍利弗等都不識知何況出世第一義諦況乎虗無之數妙也重玄之域其道無涯欲之頓盡耶此法合也虗無重玄用老子文玄之又玄故曰重玄皆況涅槃無為之義言有為之數二乘之智尚不能窮況涅槃無為之道乎譬如大海無涯而操舟有里數太虗寥廓而翔翮有遠近三乘之人於涅槃之道亦猶是也書不云乎為學者日益為道者日損為道者為於無為者也為於無為而曰日損此豈頓得之謂要損之又損之以至於無損耳經喻螢日智用可知矣引老子為學日益為道日損損之又損至於無損以明漸斷漸證之義至於無損者至無可損為極證耳螢日放光義云二乘之智如螢火虫不敢作念徧照閻浮菩薩之智譬如日出徧照閻浮生盲之人皆得利益等譏動第十四如前所云既以取捨為心損益為行是則尚求之心擾動未息何以動擾之心證不動無為之理乎故譏以詰之有名曰經稱法身已上入無為境心不可以智知形不可以象測體絕陰入心智寂滅上明無為之理而復云進修三位積德彌廣此明好尚之心夫進修本因也於好尚積德生起也於涉求好尚則取捨情現涉求則損益交陳既以取捨為心損益為體言體究行也而曰體絕陰入心智寂滅此文乖致殊而會之一人無異指南為北以曉迷夫此躡前進修損益以興難也經稱法身已上謂初登地已契法身證真如理故云入無為境以無分別智現身益物故云心不可以智知形不可以象測至七地頓捨藏識故云體絕陰入證平等真如故云心智寂滅自此復進修三位方成佛果此引經按定下申難意謂進修積德本於好尚涉求凡好尚則取捨未忘涉求則損益交陳既有取捨損益之心則動擾未息而又曰體絕陰入心智寂滅此則文乖於理如何會之一人以動心而取靜理無異指南為北也動寂第十五前名家譏動今答以動寂而不言寂動者以問家但譏其動謂動則違寂不知動時全寂故云動寂無名曰經稱聖人無為而無所不為此引證聖人動靜一如總答難意也經即放光云佛言適無所為故行般若波羅蜜無所為寂也無所不為動也即寂而動故雖動而常寂故下廣明進修無取捨無為故雖動而常寂無所不為故雖寂而常動雖寂而常動故物心也莫能一以體用雙彰故莫能一雖動而常寂故物境也莫能二以心境一如故莫能二物境也莫能二故逾動逾寂物心也莫能一故逾寂逾動此言聖心寂照雙流體用雙彰故心境一如動靜不二豈可動靜而二其聖心哉所以為即無為無為即為動寂雖殊而莫之可異也此證經義以明動靜不二之所以也下明聖心絕待答前積德道行曰心亦不有亦不無此引經證聖心不涉有無以明積德非有心也雖好尚涉求似分身心而總攝於心故言積德雖涉求亦非有心亦非無心任運而已不有者不若有心之有不無者不若無心之無此釋經義揀非斷常也言不有者不是絕無但不似眾生之有心耳言不無者不是實有但不比無情之無耳何者有心則眾庶是也無心則太虗是也眾庶止於妄想太虗絕於靈照豈可止於妄想絕於靈照標其神道指涅槃而語聖心者乎此重明聖心不有不無之所以也若有心則是凡夫無心則是太虗凡夫則所止於妄想太虗則絕然無知豈可以妄想無知以擬涅槃妙道以語聖心為有無哉是以聖心不有不可謂之無絕無聖心不無不可謂之有實有此雙遮聖心不屬有無以遣妄見不有故心想都滅不比凡夫不無故理無不契不比太虗理無不契故萬德斯弘心想都滅故功成非我以明離過顯德以彰聖心本無涉求也以滅妄想又非無知乃離二邊之過故能證一真之理故云理無不契以證一真法界則恒沙性德總在心源故萬德斯弘以妄想盡滅則永絕貪求故雖功成而非我證如此又何好尚涉求之有哉所以應化無方未嘗有為寂然不動未嘗不為經曰心無所行無所不行信矣此總結答難意謂聖心無為而為寂然而應如此豈有為好尚涉求之心而以動擾譏之哉引經證一致可知儒僮曰昔我於無數劫國財身命施人無數以妄想心施非為施也今以無生心五華施佛始名施耳儒僮義引智論事謂以身命等施出妄想心求五波羅蜜未有所得今見然燈以五華供佛布髮掩泥即得無生法忍滿足波羅蜜等謂七地以前有相觀多未達三輪體空名住相布施非真施也至第八無相地證平等真如三輪空寂故即得受記故云始是施耳意謂聖心果有好尚涉求豈能證無為之理乎又空行菩薩入空解脫門方言今是行時非為證時此引放光義言菩薩已入空解脫門方言乃是行時非為證時意謂單空尚不能證況動心乎顯寂用同時為真行耳然則心彌虗行彌廣終日行不乖於無行者也謂菩薩已入空解脫門依空起行則寂而常照故心心寂滅行行契真所以動而常寂也是以賢劫稱無捨之檀成具美不為之為禪典唱無緣之慈思益演不知之知聖旨虗玄殊文同辯連引四經以證不為而為之義梵語檀那此云布施賢劫經說一切諸法無有與者是名布施成具云不為而過為禪經說慈心三昧有無緣之慈思益云無取捨之知方為知此上四義皆言不為而為之旨故云殊文同辯豈可以有為便有為無為便無為哉菩薩住盡不盡平等法門不盡有為不住無為即其事也而以南北為喻殊非領會之唱此責其動靜異見而引經證義也菩薩下即義引淨名經略云上方香積世界菩薩欲還本國向佛求法佛言有盡無盡法門汝等當學云云如菩薩者不盡有為不住無為彼疏云有為雖偽捨之而大業不成無為雖實住之而慧心不朗即其事者正同前動寂無礙之旨也若有無異見動寂殊觀而以南北為喻豈能領會聖心哉窮源第十六窮謂窮討源謂根源由聞前說已知動靜不二今則行成必證未審能證之人與所證之法誰先誰後有名曰非眾生無以御控進也三乘非三乘無以成涅槃然必先有眾生後有涅槃是則涅槃有始有始必有終約人則人先法後約法則法先人後而經云涅槃無始無終湛若虗空則涅槃先有非復學而後成者也此難涅槃與人兩異設難若先有眾生是眾生證得則涅槃有始終若先有涅槃則不屬修得何言眾生得涅槃耶此難似不易通下答以涅槃無始無終無古無今浩然大均物我無二唯會物為己即是聖人亦無始得通古第十七意謂涅槃之體性自常然無古無今何有始終萬法本寂當體涅槃三乘悟此即為證得亦無先後但以智契理理智冥一唯心契會故無始終無名曰夫至人空洞無象而萬物無非我造會萬物以成己者其唯聖人乎言聖人一心寂滅空洞無象以隨緣成事故三界萬法唯心所現故云無非我造以諸法寂滅之體即是涅槃若能了達萬法唯心法法皆歸自己是名聖人證得涅槃但是以如如智照如如理理智冥一是為涅槃豈有先後始終於其間哉即此一語盡破其疑何則徵釋理智一如非理不聖非聖不理理而為聖者聖不異理也理即萬法一真之理聖謂照理之智謂非契理不足以彰聖智故云非理不聖非智不足以證理故云非聖不理以證理而為智故智不異理平等一心是為證得涅槃故天帝曰般若當於何求善吉曰般若不可於色中求亦不離色中求又曰見緣起為見法見法為見佛斯則物我不異之效也由上云一心成萬法照萬法唯一心名為涅槃萬法境寬今就五蘊中舉一色法以明則法法皆然故引天帝之問乃大品經散華品文謂般若乃能照之智萬法乃所照之境今但舉色法以例餘言心境非一故不可於色中求以心境非異故不離色中求以色即是空空即如如無如外智能證於如故云不離不即不即不離是為一心中道又曰下義引涅槃經文緣起十二因緣也見緣起性空是為見法見法即見佛斯則物我不異之效也又何有先後始終哉所以至人戢止也玄機智也於未兆藏冥寂也運動也於即化總六合以鏡心一去來以成體古今通始終同窮本極末莫之與二浩然大均乃曰涅槃此正出涅槃之體也未兆寂然不動之境也謂聖人以真智照理止於寂然不動之先運即寂之動潛於萬化之域六合不離一心故云總古今不離一念故云一去來故十世古今始終不離當處故云通云同窮本極末究竟一際浩然大均乃曰涅槃涅槃之道如此廣大虗寂豈可以先後始終而擬之哉經曰不離諸法而得涅槃又曰諸法無邊故菩提無邊此引證諸法即真故心境不二也放光云諸法無邊際故般若波羅蜜亦無際此證理智皆依諸法以顯心境不二也以知涅槃之道存在也乎妙契妙契之致本因也乎冥一依聖言量因知涅槃之道單在妙合心境心境如如因乎理智冥一此外無可證者然則物境也不異我心也我不異物物我玄冥也會歸乎無極理智一如物我無二忘心絕照冥會一心故曰歸乎無極蓋寄無極之言以顯一心廣大寂滅之體耳進之弗先退之弗後豈容終始於其間哉謂三乘證之而弗先六道迷之而非後無古無今前後際斷豈容終始於其間哉天女曰耆年解脫亦如何久此引證久近也淨名身子問天女止此室其已久如曰如耆年解脫身子曰止此久耶天女云云謂身子所得解脫豈屬久近之時耶考得第十八承上不離諸法而得涅槃因之稽考盡陰存陰違教違理當何得乎所以末後辯者謂從前決擇修悟已周意顯極證故也有名曰經云眾生之性極於五陰之內又云得涅槃者五陰都盡譬猶燈滅上引經定理下申難然則眾生之性頓盡於五陰之內涅槃之道獨建於三有之外貌然殊域非復眾生得涅槃也陰盡無得違果若有得則眾生之性不止於五陰必若止於五陰則五陰不都盡五陰若都盡誰復得涅槃耶存陰有得違難意謂眾生得涅槃然眾生之性止於五陰之內且涅槃獨建於三有之外此則內外本自相懸今云五陰都盡乃得涅槃然五陰已盡於內又誰得界外之涅槃耶此則陰盡無能得者也若眾生果得涅槃者則性不止於五陰矣若止於五陰則五陰不盡若五陰都盡誰復得涅槃耶此則陰存而無得者也未達五陰空寂即是涅槃故耳玄得第十九得無所得無得而得故云玄得無名曰夫真由離起顯也偽因著生著故有得離故無名謂涅槃真理由超情離見而顯分別妄偽由執著名相而生故執名相者為有得離情見者故無名是以則法也真者同真法偽者同偽子以有得為得故求於有得耳吾以無得為得故得在於無得也言凡取法於真者則契真執著於偽者則同偽故不以有得為真以無得為得耳此正申玄得之旨也且談論之作必先定其本既論涅槃不可離涅槃而語涅槃也若即涅槃以興言誰獨非涅槃而欲得之耶若剋體而言涅槃則一切眾生本來涅槃故云誰獨非涅槃而欲得之耶以一切法本來如故此標宗下辯義何者徵釋正義夫涅槃之道妙盡常數泯絕諸相融和也冶銷也二儀蕩滌萬有均天人同一異內視不己見返聽不我聞未嘗有得未嘗無得此辯涅槃妙體也以涅槃妙體離一切相故云妙盡常數二儀天地也萬有萬物也經云一人發真歸元十方虗空悉皆銷殞何況空中所有國土而不振裂故云融冶二儀蕩滌萬有由此所以均天人同一異也以非色故內視不己見以非聲故返聽不我聞以寂漠沖虗故未嘗有得以諸法寂滅平等無二故未嘗無得經曰涅槃非眾生亦不異眾生維摩詰言若彌勒得滅度者一切眾生亦當滅度所以者何一切眾生本性常滅不復更滅此名滅度在於無滅者也引涅槃經義言涅槃之體永離生滅故非眾生以眾生之性本來寂滅故不異涅槃引淨名經義彌勒若得滅度者則一切眾生亦當滅度以一切眾生本性畢竟寂滅即涅槃相不復更滅此名滅度在於無滅豈有盡五陰而求涅槃又豈可存五陰而別求得涅槃耶然則眾生非眾生以性空故誰為得之者無能得之人涅槃非涅槃以離相故誰為可得者無所得之法放光云菩提從有得耶答曰不也從無得耶答曰不也從有無得耶答曰不也離有無得耶答曰不也然則都無得耶答曰不也是義云何答曰無所得故為得也是故得無所得也無所得謂之得者誰獨不然耶言得涅槃者以眾生性空故無能得之人涅槃寂滅離相故無可得之法能所雙忘故無所得為得以無所得為得者則一切諸法本來寂滅不復更滅斯則法法真常生佛平等且誰獨不然耶然則玄道在於絕域故不得以得之妙智存乎物外故不知以知之大象隱於無形故不見以見之大音匿於希聲故不聞以聞之此言涅槃之體超心境絕見聞結示玄得之方也玄道指涅槃實際為所觀之境以體絕諸相故稱絕域以此非所得之境故不得以得之妙智謂能證之智實智照理離諸對待故云物外以寂而照故不知以知之以一真法界謂之大象無狀無形非可見之境故不見以見之寂滅圓音謂之大音羣動永息非妄聞可及故不聞以聞之故能囊括終古導達羣方亭毒養育也蒼生疎而不漏汪哉洋哉何莫由之哉上示涅槃玄得之體此顯無方大用也故能爾者由自體甚深所以能德用廣大囊括義取易云括囊無咎謂結其囊口今取包括無遺之義謂涅槃真常不但無始亦且無終今古常然故云囊括終古導開引也達示悟也羣方九界眾生也由其用廣故開悟九類養育羣生以眾生迷之而不返似為疎遠如不修則已修而即得故云不漏汪洋無涯故聖凡以之而出入依正以之而建立法界以之而張因果以之而不昧故曰何莫由之哉故梵志曰吾聞佛道厥其也義弘廣也深汪洋無涯靡無也不成就靡不度生此引梵志歎佛之言以證涅槃化生之用然則三乘之路開真偽之途辯賢聖之道存無名之致顯矣此總結宗極也一論所述九折皆三乘權教之跡十演乃一乘之實今論開權顯實故云三乘之路開無名顯理為真有名執跡為偽如上所論真偽自辯以時宗廓無聖秦主斥曰若無聖人知無者誰故論主奉詔作論以破無聖斷見之執今言儒童進修空行起行是有能修能證之人故曰賢聖之道存名家按名責實今論主發揮無名之致故云顯矣涅槃無名論終肇論略注後跋此論言未及二萬題方稱五篇義則席卷聲教囊括眾經而罄佛淵海者矣論主因見教中談真指不遷導物開流動恐未忘標指者依文解二而二其心故且翻其辭改其名曰物不遷曰不真空等文似相角而義實相符所造未嘗異而所見未嘗同也然推論主心蕩無纖異實為暢我佛攝未歸本之懷是以即物而論虗玄標高揭物我同根此不異雜華云法性本無生示現而有生是中無能現亦無所現物能現所現既即無昔來今往又何朕故曰昔人非昔人野馬或不動良有此深因非驟而語不遷後尚有約義而駁其文者有臨文而駭其義者然又有駁其駁者迄我明憨山大師主盟此道執牛耳於宗途已探此論之奧而識其微因見言路縱橫學人首鼠兩端莫之趨向即搦管作疏弄丸其間析諸家之難而闡其幽旨名曰略注古今開闢本末貫通借曰千途異唱會歸同致矣愚意在昔毗耶大士為世尊教海汪洋代下一轉語即令五百弟子飽䬸香積而消之繼踵肇公論主復白一椎至今憨山大師筆底方能轉身吐氣抑亦為論主作此一轉語耶而始令人悟入宗本開無知般若鑒不真空了物不遷而無名涅槃即可證此又一䬸香積矣雖各相去千有餘年要知般若光中以燈續燈若旦暮遇之也注成大師尚固扃鐍以藏之恰有居士雲山合掌請曰摩尼妙在普雨而法寶幸流通弟子雖處瓶之罄因惜自他慧命如絲願貸粟監河但得金二十五便可資棗黎氏流行而皆沾其法味幸何如哉大師領而授之來命跋於不肖因贊之曰向之於此論也但登其枝而忘其本咀其華而不食其實者眾矣今得大師信筆注成又爾居士信心刻之今而後之於此論也可括目矣必能達其本根矣此其論之中興也歟萬歷歲次丁巳孟秋華山法姪慧浸識
