body:
  text: 明匡山沙門憨山釋德清述肇論肇乃作者之名曰僧肇時稱肇公論乃所立之論蓋以人名論也公為什門高弟從譯場翻譯諸經久參什師深達實相比因佛法西來甚少大義未暢時人多尚老莊虗無之談而沙門釋子亦相尚之多宗虗無以談佛義各立為宗如晉道恆述無心論東晉道林作即色遊玄論晉竺法汰作本無論皆墮相言無都墮斷滅公愍大道未明故造此四論以破邪執斯立言之本意也論者謂假立賓主徵析論量以顯正理摧破邪執人法雙影故曰肇論後秦長安釋僧肇作苻堅有國據關中號為大秦暨姚萇篡立亦號為秦故史以前後別之萇崩其子興嗣國什師譯經當興之時故公稱後秦按公傳略云法師僧肇京兆人幼家貧為人傭書遂博觀子史志好虗玄每以老莊為心要既而歎曰美則美矣然其栖神冥纍之方猶未盡善後見舊維摩經歡喜頂受乃曰始知所歸矣因此出家年二十為沙門名震三輔什公在姑臧肇走依之什與語驚曰法中龍象也及歸關中詳定經論四方學者輻輳而至設難交攻肇迎刃而解皆出意表著般若無知論什覽之曰吾解不謝子文當相揖耳傳其論至匡山劉遺民以似遠公公拊髀歎曰未曾有也復作物不遷等論皆妙盡精微秦主尤重其筆札傳布中外年三十二而卒當時惜其早世云宗本義宗本者示其立論所宗有本也以四論非一時作論既成乃以宗本義統之蓋所宗本乎一心以窮萬法迷悟凡聖之源也如起信以一心為宗有法有義故曰宗本義本無實相法性性空緣會一義耳此標宗揀法以為四論之本也本無者直指寂滅一心了無一法離一切相逈絶聖凡故曰本無非推之使無也以一切諸法皆一心隨緣之所變現心本無生但緣會而生故曰緣會以緣生諸法本無實體緣生故空故曰性空以全體真如所變故曰法性真如法性所成諸法真如無相故諸法本體寂滅故曰實相是以本無為一心之體緣會為一心之用實相法性性空皆一心所成萬法之義故曰一義耳依一心法立此四論不遷當俗不真當真二諦為所觀之境般若為能觀之心三論為因涅槃為果故首為宗體何則此徵起四論各有所宗一切諸法緣會而生此下標顯不遷宗體也寂滅一心本無諸法本無今有故曰緣會而生緣會而生則未生無有緣離則滅此顯心本不生但是緣生非心生也以生本無生故滅亦緣滅非心滅也不生不滅一心之義於是乎顯矣如其真有有則無滅此返顯緣生諸法非實有也真實也若諸法果是實有則不應隨緣散滅今既隨緣滅則法非實有矣以此而推故知雖今現有有而性常自空性常自空故謂之性空以此緣生緣滅而觀諸法則知雖今現有而非實有以體常自空體常自空故義説性空性空故故曰法性諸法實性即是真如真如性空以真如性現成諸法法法全真良由真如性空故諸法性空稱為法性法性如是故曰實相諸法之性全體真如真如之相本自無相法性如如寂滅離相故曰實相實相自無非推之使無故名本無實相乃真如實體今既隨緣成一切法則法法皆真若觀法法全真則了無一法可當情者斯則不待推測使無則法本無也萬法本無又何有一毫可轉動哉以此而觀諸法則不遷之旨昭昭心目矣上明不遷宗本言不有不無者此標不真空宗本也不如有見常見之有邪見斷見之無耳此標立論所破之執也不如猶不比也凡夫外道定執諸法是實有確執諸法為斷滅之無政在所破但以不字破之故曰不有不無若以有為有則以無為無此出計也若以諸法為實有則墮常見若以諸法為實無則墮斷見夫不存無以觀法者可謂識法實相矣此示正觀也存無下應添一有字言不存有無二見以觀法可謂識法之實相矣以有無二見顛倒見也雖觀有而無所取相然則法相為無相之相聖人之心為住無所住矣此出觀益也謂離有無二見以觀諸法則法法寂然故法雖有而不取相不取法相則當體如如故相即為無相之相矣諸相無相寂滅性空斯則所觀之境空境空則心自寂故聖人之心為無住之住此心空也心境俱空於何不寂三乘等觀性空而得道也性空者謂諸法實相也見法實相故云正觀若其異者便為邪觀設二乘不見此理則顛倒也此約法以顯能觀之人也三乘之人同觀性空而得道果然此諸法性空即是實相能見諸法實相方為正觀設使二乘不見此理則同凡夫顛倒矣此單約諸法盡皆實相二乘所見偏空亦是實相性空若不是實相性空何以得證道果意謂法一人異故下難明是以三乘觀法無異但心有大小為差耳此明法一人異也伏難難曰既三乘同見一法何以證果有差答曰其實三乘觀法無異但為心有大小故證果有差耳足知法本是一但人心大小有異故所證果不同以取不取相故耳非法異也正若三獸渡河河本是一但三獸大小不同故所履淺深不一斯乃獸三而河非三也詳夫立論之意蓋以不遷當俗不真當真二諦為所觀之境般若為能觀之智境智為因涅槃為果其三乘乃能修之人故介宗本之中良有以也漚和般若者大慧之稱也此標般若無知宗本也梵云漚和此云方便般若此云智慧以有方便之智乃稱大慧若無方便但名孤慧故所取偏空非大慧也前二論真俗二諦當所觀之境今漚和般若為能觀之心雙照二諦不取有無不墮二邊故云大慧諸法實相謂之般若能不形證漚和功也適化衆生謂之漚和不染塵纍般若力也此釋大慧之義也能見諸法實相是謂般若雖觀空而不取證仍起方便度生之事是仗漚和之功也適化衆生乃方便之事雖涉生死不被塵勞所纍全仗般若之力也是以菩薩觀空而萬行沸騰涉有而一道清淨淨名云無方便慧縛有方便慧解無慧方便縛有慧方便解雙照二諦不取有無之相故能出空入假而無礙故云大慧然則般若之門觀空漚和之門涉有涉有未始迷虗故常處有而不染不厭有而觀空故觀空而不證是謂一念之力權慧具矣一念之力權慧具矣好思歷然可解此重明不證不染之義也以般若唯照空漚和唯涉有以涉有而不迷虗是仗般若之力故處有而不染以不厭有而觀空故觀空而不取證是仗漚和之功也斯則空有不異之二諦權實不二之一心同時雙照存泯無礙故曰一念之力權慧具矣好思歷然可解者勉其用心觀照分明則心境歷然權實並顯當不勞而妙契矣泥洹盡諦者直結盡而已則生死永滅故謂盡耳無復別有一盡處耳此標涅槃無名宗本也言泥洹亦名涅槃稱為盡諦者直是煩惱結盡而已所謂五住究盡故二死永亡是生死永滅名為盡耳非復別有一盡處可歸亦非實有一名可稱也故曰涅槃無名四論所宗一心為本謂不有不無之二諦以非知不知之觀照證不生不滅之一心因果冥會妙契環中宗本之義盡乎是矣物不遷論第一此論俗諦即真為所觀之境也物者指所觀之萬法不遷指諸法當體之實相以常情妄見諸法似有遷流若以般若而觀則頓見諸法實相當體寂滅真常了無遷動之相所謂無有一法可動轉者以緣生性空斯則法法當體本自不遷非相遷而性不遷也能見物物不遷故即物即真真則了無一法可當情者以此觀俗則俗即真也良由全理成事事事皆真諸法實相於是乎顯矣論主宗維摩法華深悟實相以不遷當俗即俗而真不遷之旨昭然心目夫生死交謝寒暑迭遷有物流動人之常情余則謂之不然將明不遷先立遷流之相為所觀之境要在即遷以見不遷非相遷而性不遷也是由人迷謂之遷人悟即不遷故曰人之常情余則謂之不然論主妙悟實相故總斥之法華云不如三界見於三界大火所燒此土安隱譬如恆河之水人見為水鬼見為火迷悟之分亦由是也何者徵釋迷悟之由放光云法無去來無動轉者引經立定宗體此義引彼經第七卷中云諸法不動搖故諸法亦不去亦不來等即法華云是法住法位世間相常住蓋言諸法實相當體如如本無去來動轉之相佛眼觀之真空冥寂凡夫妄見故有遷流不遷論旨以此為宗尋夫不動之作豈釋動以求靜必求靜於諸動此依宗出體也尋究不動之旨蓋即動物以見真常非捨動以求靜也良由全理所成之事法法皆真當體常住非於事外求理故但言事不遷不説理不遷也以即事物以見不遷故云必求靜於諸動立論文義有四段初約動靜以明境不遷次約境以明物不遷三約古今以明時不遷四約時以明因果不遷此初也必求靜於諸動故雖動而常靜不釋動以求靜故雖靜而不離動此依體釋義也必求靜於動雖萬動陳前心境湛然故曰雖動常靜苟不捨動求靜故一道虗間雖應緣交錯不失其會如華嚴云不離菩提場而遍一切處所謂佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座不悟此理難明動靜不二之旨然則動靜未始異而惑者不同緣使真言滯於競辨宗途屈於好異所以靜躁之極未易言也此依義辨惑也其實動靜一源本來不二故未始異但迷者妄見不同各執一端真言如所引不去來動轉等了義之談以異見不同故使真實之言滯於競辨而不通使一乘真宗不能伸暢返屈於好異之論如所破心無本無廓然等皆不了實相而妄生異論論者以此之故所以靜躁之極致難與俗人言也何者徵釋難言之所以夫談真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味所以難言者以法不應機所謂高言不入於俚耳也若談真則逆俗人之耳若順俗則違真常之道若真常不明則迷者不能使之歸真若逆俗人之耳則言之出口淡而無味此其所以難言也緣使中人未分於存亡下士撫掌而弗顧所以難言者正為根機之不同也其順真逆俗之言若上根利智聞而便信故不失人亦不失言若使中根之人則猶疑不決故未分存亡若下根聞之則撫掌大笑而不顧矣存亡撫掌二語出老子中士聞道若存若亡下士聞道大笑之不笑不足以為道是知實相妙談聞而信者實不易得所以靜躁之極未易言也近而不可知者其唯物性乎此歎不唯信根之難而真常之法其實難信難解也以其觸目皆真目對之而不覺可不哀歟然不能自已聊復寄心於動靜之際豈曰必然試論之曰此言作論之意為愍迷者悲興於懷不能自已聊爾寄心於動靜之間以明動靜不二之言以曉迷者然非敢謂必然但試論之耳道行云諸法本無所從來去亦無所至中觀云觀方知彼去去者不至方此引經論以定不遷宗極也諸法當體寂滅本自無生從緣而生故無所從來緣散而滅故去亦無所至如空中華無起滅故中論但義引彼第二論破去來品云去法去者去處皆相因待不得言定有定無是故決定知三法虗妄空無所有但有假名如幻如化大方無隅本無定向去者妄指其實無方可至如人往東究竟不知以何為東也斯皆即動而求靜以知物不遷明矣此下論物不遷也經言法無來去則觸目真常論云去不至方則去而不去斯皆即動求靜之微意證知物不遷明矣夫人之所謂動者以昔物不至今故曰動而非靜如朱顏在昔今已老耄以謂流光遷謝故曰動而非靜我之所謂靜者亦以昔物不至今故曰靜而非動以我而觀朱顏自住在昔未嘗遷至於今故曰靜而非動動而非靜以其不來人之以為遷流者以少壯不來故以為動靜而非動以其不去我之所謂不遷者以少壯在昔不來今亦如老耄在今不至昔故以為靜然則所造未嘗異所見未嘗同同以昔物不來而見有動靜之不同逆之所謂塞順之所謂通迷者以情逆理故塞悟者以理達事故通苟得其道復何滯哉若悟真常有何相可滯哉傷夫人情之惑也久矣目對真而莫覺上逆順二言總申實相之境不異因人迷悟之不同故所見有乖此傷夫下正出迷情以觸目皆真但人迷不覺良可哀哉既知往物而不來而謂今物而可往往物既不來今物何所往此總責迷倒也既知往物不來則知昔住在昔而不來今則可例知今物亦不至昔矣此乃不遷之義也却謂今物可遷而往豈不迷哉何則求向物於向於向未嘗無責向物於今於今未嘗有於今未嘗有以明物不來於向未嘗無故知物不去覆而求今今亦不往是謂昔物自在昔不從今以至昔今物自在今不從昔以至今此約今昔不相往來正明不遷之義也以向物自住在向而不來即今求向而不可得返覆而觀則知今自住今而不至向則不遷之義明矣以其昔自住昔今自住今絶無往來之相以此觀之不遷之旨昭然可見論初引經論以無去來立定宗體故返覆論之故仲尼曰回也見新交臂非故如此則物不相往來明矣此引孔子之言以證不遷之義也義引莊子仲尼謂顏回曰吾與汝交一臂而失之可不哀歟意謂交臂之頃已新新非故蓋言迅速難留之如此也論主引意要在迅速極處乃見不遷之實楞伽云一切法不生我説剎那義初生即有滅不為愚者説賢首解云以剎那流轉必無自性無自性故即是無生若非無生則無流轉是故契無生者方見剎那淨名云不生不滅是無常義論主深悟實相即在生滅遷流法中頓見不遷之實故所引乃遷流之文以明不遷之旨非達無生意者最難轉身吐氣也既無往返之微朕有何物而可動乎此結顯妙悟不落常情也後結文云得意毫微雖速而不轉言諸法湛然無纖微朕兆來去之相有何物而可動轉乎詳其論意雖云今昔之物本無去來要見時無古今平等一際若達古今一際則物自無往來所謂處夢謂經年覺乃須臾頃故時雖無量攝在一剎那所謂枕上片時春夢間行盡江南數千里若以夢事而觀諸法則時無古今法無去來昭然心目才入意地便墮流轉此非常情可到也然則旋嵐偃嶽而常靜江河兢注而不流野馬飄鼓而不動日月歷天而不周復何怪哉此引迅速四事以證即物不遷以成上無往返之微朕意也旋嵐亦云毗嵐乃壞劫之風須彌為之摧故云偃嶽野馬出莊子乃澤中陽𦦨飄揚不停且此四事常情見之以為遷流之極若言不遷則以為怪以明眼觀之本無遷流復何怪哉如初引經云法無去來無動轉者正要即動以見不遷非指靜為不遷也靜已不遷又何論之有故論命題乃以物物當體不遷非言相遷而性不遷也此不遷之旨正顯諸法實相非妙悟之士誠不易見上已備論不遷之旨下引教會通以釋前真言滯於競辨宗途屈於好異靜躁之極未易言等文要人離言會意不可執言失旨也噫聖人有言曰人命逝速速於川流此言人命無常意在密顯真常是以聲聞悟非常以成道緣覺覺緣離以即真二聖皆以聞無常而證果苟萬動法也而非化化言生死無常也豈尋化以階道道涅槃果也意謂若萬法不是無常二乘聖人何以由聞無常而證聖果覆尋聖言微隱難測返覆推尋聖人之言雖説無常而意在密顯真常所以隱微難測若動而靜似去而留聖人言雖動而意在顯靜言似去而意實常住所以靜躁之極未易言但可以神會難以事相求之耳若不達聖人立言之旨不能離言得意將謂實有生死去來之相執言競辨此則終不能悟不遷之妙直須離言得體方能契會本真耳可以神會難以事求謂滯相則迷真當契神於物表耳是以言去不必去間人之常想稱住不必住釋人之所謂往耳豈曰去而可遣住而可留也此釋聖言難測教人離言體妙也言去言往乃生死法也住乃涅槃常住之果也凡聖人言生死遷流不是實有可去之相但防間凡夫執常之想耳所稱涅槃常住非是實有可住之相但破二乘厭患生死之情耳其實生死與涅槃二俱不可得豈曰定有生死可遣實有涅槃可留也下引證故成具云菩薩處計常之中而演非常之教摩訶衍論云諸法不動無去來處斯皆導達群方兩言一會豈曰文殊而乖其致哉此明聖人言異而旨一釋上生死涅槃二法皆空之義也成具言菩薩以處凡夫計常之中故説無常以破其執非是實有生死之相意在令人即無常以悟真常如大論云諸法湛然常住不動本無去來意欲令人即羣動以悟不遷而常與無常之言皆導達羣方隨類應機之談言異而旨一豈以殊文而乖其致哉執言競辨豈非惑耶下釋兩言一會是以言常而不住稱去而不遷證無為而不捨萬行故常而不住處生死而不起涅槃故去而不遷不遷故雖往而常靜雖順萬化而一道湛然不住故雖靜而常往不起滅定而現諸威儀雖靜而常往故往而弗遷以無心意而現行故常往而弗遷雖往而常靜故靜而弗留矣不住無為不捨有為故靜而不留此釋兩言一會之義也然則莊生之所以藏山仲尼之所以臨川斯皆感往者之難留豈曰排今而可往是以觀聖人心者不同人之所見得也此引二氏之言證明兩言一會之義也莊子曰藏舟於壑藏山於澤謂之固矣有力者負之而趨昧者不覺藏天下於天下則無所遁矣此言舟山藏於壑澤將謂之固然被有力者負之而趨則不能留如今人熟睡舟中順流而去雖遷實不見其遷意謂人未忘形合道縱隱遁山林寄形天地然形骸亦被造化密移而昧者不覺以有所藏則有所遁若形與道合則無所藏無藏則無遁如藏天下於天下則無所遁此莊子意也論語子在川上曰逝者如斯夫不捨晝夜此歎道體無間如川流之不息此孔子意也論主引文以證不遷意取昧者不覺則雖遷而不遷不捨晝夜則雖往而不往故論釋之曰斯二語者但是感歎往者之難留不是排今而可往斯則言雖似遷而意實不遷故誡之曰觀聖人之心不以常情執言害義可謂之得矣論主引遷流之文而釋以不遷之義結以不是排今可往則重在今物自在今不從昔以至今一語為不遷之準要人目前當下直達不遷之旨了無去來之相求之言外則妙旨昭然何者人則謂少壯同體百齡一質徒知年往不覺形隨人雖同體一質而有老少之不同形容似有遷變其實朱顏自隨住在昔少時而不來老耄自住在今而不去此不遷意也是以梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人皆愕然非其言也所謂有力者負之而趨昧者不覺其斯之謂歟此引梵志之事以釋雖遷而不遷以明昧者不覺之義也且梵志自少出家白首而歸鄰人見之謂昔人猶在是以昔之朱顏為今之老耄梵志答曰吾似昔人非昔人也意為少壯自住在昔而不來豈可以今之老耄排去而至昔耶此不遷之義明甚但鄰人不知故愕然非其言是昧者不覺之意也豫少讀此論竊以前四不遷義懷疑有年因同妙師結冬蒲阪重刻此論校讀至此恍然有悟欣躍無極因起坐禮佛則身無起倒揭簾出視忽風吹庭樹落葉飛空則見葉葉不動信乎旋嵐偃嶽而常靜也及登廁去溺則不見流相歎曰誠哉江河競注而不流也於是回觀昔日法華世間相常住之疑泮然冰釋矣是知論旨幽微非真參實見而欲以知見擬之皆不免懷疑漠漠吾友嘗有駁之者意當必有自信之日也是以如來因群情之所滯則方言以辨惑乘莫二之真心吐不一之殊教乖而不可異者其唯聖言乎此總結聖人言異而心不異也諸佛出世本來無法可説但因群生所執之情故隨類設言以辨惑破其執耳所乘乃不二之真心其言乃不一之殊教其説雖乖而心實不可異者其唯聖言乎隱微難測正在於此故談真有不遷之稱導俗有流動之説雖復千途異唱會歸同致矣此釋乖而不異之義也謂談真有不遷之稱而意在攝俗導俗有流動之説而意在返真是以千途異唱會歸同致此所以乖而不可異也而徵文者聞不遷則謂昔物不至今聆流動者而謂今物可至昔既曰古今而欲遷之者何也此出迷者執言失旨也徵文謂但取信於文言者隨語生解聞不遷則謂昔物不至今似為得旨及聆流動又謂今物可至昔既曰古今則古自住古今自住今而欲遷今至古者何耶此責執言之失也以古不來則易見言今不至昔最難明論主直以現今當下不遷至昔立定主意要人目前頓見不遷之實了悟諸法實相為論之宗極是以言往不必往古今常存以其不動稱去不必去謂不從今至古以其不來此下正破迷執也上論物不遷此論時不遷凡言往不必作往解古今常存者以其不動也凡稱去不必作去解謂不從今至古者以古不來今也不來故不馳騁於古今不動故各性住於一世此結歸宗體也以其不來不去了無三際之相故不馳騁於古今不動不靜平等一如故各性住於一世然則群籍殊文百家異説苟得其會豈殊文之能惑哉此顯忘言會旨也雖則千經萬論殊文異説苟得法界宗通則會歸一真之境豈被文言之所惑哉是以人之所謂住我則言其去人之所謂去我則言其住然則去住雖殊其致一也故經云正言似反誰當信者斯言有由矣此顯迷語一源也人之所謂住者乃妄執為常且執常則墮無常矣故我言去以破其執者意在無住非謂往也今之所謂去者乃執生死無常也我則言其住以破其執意在本無生死非謂住而可留也是則去住二言無非破執之談以顯一真常住故言殊而致一正若老氏所云正言似反誰當信者斯言有由矣此言迷悟不出一真是非本無二致正是現前則不隨言取義也何者此徵顯古今不遷要即迷返悟也人則求古於今謂其不住人於今中求古而不可得則計以為遷此迷也吾則求今於古知其不去我求今於古中而不可得則知今不去此悟也今若至古古應有今古若至今今應有古若今古果有往來則當互有其迹今而無古以知不來古而無今以知不去此正示不遷義也以今中無古則知古不來古中無今則知今不去既無來去則前後際斷又何遷之有若古不至今今亦不至古古今不相到事各性住於一世有何物而可去來若悟古今一際則了法法真常經云是法住法位世間相常住此則事各性佳於一世有何物而可去來哉然則四象風馳璇璣電捲得意毫微雖速而不轉此結歸妙悟也四象乃日月星辰新疏指四時璇璣舊為北斗二星名今意為斗樞皆旋轉不停如電捲無速也苟悟不遷之理於毫微則雖速而不轉若法界圓明則十方湛然寂滅矣前一往皆論迷見遷流故故為凡此下論悟則不遷是為聖是以如來功流萬世而常存道通百劫而彌固此下言悟之為聖故常住不朽以明因果不遷也功流萬世則利他之行常存道通百劫自利之行益固雖萬世百劫時似有遷而二行不朽不遷之實也成山假就於始簣修途託至於初步果以功業不可朽故也此引二氏之言以證因果不遷之義也論語云譬如為山雖覆一簣進吾進也老子云千里之行始於足下二語皆譬資始成終之意為山萬仞假一簣以成功山成而初簣不廢如行千里始於發足一步行至而初步不移故功成至聖行滿不異於初心所謂發心畢竟二無別從因至果而行行不遷淨名云所作之業亦不忘不忘則不朽善惡皆然此論聖功也功業不可朽故雖在昔而不化不化故不遷不遷故則湛然明矣故經云三災彌綸而行業湛然信其言也此以不朽釋不遷意所言功業不朽者以昔因不化由不化故不遷不遷故知因果湛然平等一際明矣引經證成彌綸充滿之義言三災壞劫乃遷之極也而行業湛然不動不壞所謂大火所燒時我此土安隱則極遷極不遷言可徵矣何者果不俱因因因而果因因而果因不昔滅果不俱因因不來今不滅不來則不遷之致明矣復何惑於去留踟蹰於動靜之間哉此總結歸因果不遷以終一論之義也何者徵明因果不遷之意果不俱因言因果終始不同遷也因因而果果成而因不滅不遷也果不俱因而昔因不來不來則昔自住昔雖遷而不遷也以不滅不來則不遷之理明矣又何惑於去留之相踟蹰於動靜之間哉踟蹰乃卻顧不進之意猶豫不決之謂也既明不遷之理又何惑於去來之時懷疑於動靜之境哉一論大義結歸於此然則乾坤倒覆無謂不靜洪流滔天無謂其動苟能契神於即物斯不遠而可知矣此結責勸修也謂既明不遷之理則旋乾倒嶽勿謂不靜洪流滔天勿謂其動此責也下勸修若能契悟於即物見真之境則觸目無非實相常住一切萬法無有一毫可動轉者斯則不必遠求而當下可知矣物不遷論終豫少讀肇論於不遷之旨茫無歸宿每以旋嵐等四句致疑及後有省處則信知肇公深悟實相者及閲華嚴大疏至問明品譬如河中水湍流競奔逝清涼大師引肇公不遷偈證之蓋推其所見妙契佛義也豫嘗與友人言之其友殊不許可反以肇公為一見外道廣引教義以駁之即法門老宿如雲棲紫柏諸大老皆力爭之竟未回其説豫閲正法眼藏佛鑑和尚示衆舉僧問趙州如何是不遷義州以兩手作流水勢其僧有省又僧問法眼不取於相如如不動如何不取於相見於不動去法眼云日出東方夜落西其僧亦有省若也於此見得方知道旋嵐偃嶽本來常靜江河競注元自不流其或未然不免更為饒舌天左旋地右轉古往今來經幾遍金烏飛玉兔走才方出海門又落青山後江河波渺渺淮濟浪悠悠直入滄溟晝夜流遂高聲云諸禪德還見如如不動麼然趙州法眼皆禪門老宿將傳佛心印之大老佛鑑推之示衆發揚不遷之旨如白日麗天殊非守教義文字之師可望崖者是可以肇公為外道見乎書此以示學者則於物不遷義當自信於言外矣
