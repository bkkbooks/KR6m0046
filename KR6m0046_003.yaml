body:
  text: 明匡山沙門憨山釋德清述般若無知論第三般若者此云智慧乃諸佛妙契法身之實智也經云諸佛智慧甚深無量即此名為根本智法界幽玄非此莫鑒故稱本智然三乘同乘此智為因但心有大小不同故唯佛為極以前不遷不真二論以顯真俗不二之真諦為所觀之境今此般若為能觀之智謂以無知之般若照不二之中道以此為因將證不生不滅之涅槃為果故次來也然般若唯一其用有三一實相般若以般若乃諸法之實相故二觀照般若即中道妙心之實智照中道之妙理理智冥一平等如一故理事雙彰權實並顯是為因心果德故名二智三文字般若以諸佛言教乃般若所流故一一文字能顯總持要即文字以明般若此般若義也無知者有二義一離妄謂本無惑取之知二顯真有三義一本覺離念靈知獨照知即無知二始覺無知謂窮幽亡鑒撫會無慮故無對待之知三文字性空非知不知然雖三義蓋以真諦無相亡知絕鑒照體獨立正無知義也什師初譯大品論主宗之以造此論以呈什師師曰吾解不謝子文當相揖耳後傳至匡山劉遺民以呈遠公公歎曰未曾有也當時見者靡不服膺夫般若虗玄者蓋是三乘之宗極也誠真一之無差此標宗極也虗玄正顯無知以幽靈絕待故謂之虗亡知絕照故謂之玄三乘同稟此智但以取不取知無知之差所謂心有大小耳其實所宗以此為極所謂不二真心故曰真一無差然異端之論紛然久矣此述造論之本意也語曰予豈好辯哉不得已也故造論之意本為摧伏邪見以正智未明不得不為之論耳有天竺沙門鳩摩羅什者少踐大方研機斯趣獨拔於言象之表妙契於希夷之境此出師承有本也梵語鳩摩羅什此云童壽以童年而有耆德故有此名師本龜茲國王之甥以其父鳩摩羅炎本天竺人今從本稱天竺亦云身毒亦名印土有五乃婆羅門所居佛出其中大方指般若什師學本生知年方二十即為國王講般若經論故云少踐大方妙悟玄猷故曰研機斯趣以般若離言故拔言象之表離相離名非見聞所及故曰妙契希夷之境希夷二字出老子言妙悟超卓今翻譯大品論主親承稟受妙契玄旨故造斯論齊異學於迦夷齊集也猶齊物之齊迦夷亦名迦維乃佛生之國佛滅度後異學紛然什師名播五天彼多宗仰故云集也揚湻風於東扇將爰燭殊方而匿耀涼土者所以道不虗應應必有由矣此敘什師入中國之由也此時道安法師名震當代秦主符堅以師尊之稱為聖人安曰貧道非聖聞龜茲國有羅什者真聖人也堅聞之欣慕不已乃遣大將軍呂光率鐵甲兵十萬伐龜茲以迎師光將兵至國圍其都城王致辭曰下國與大秦遼遠俗不相及何以見伐光曰大秦天王所以命師伐王之國者非為土地之利也因聞王國有聖人鳩摩什將迎歸供奉耳非別有所圖也王曰什乃予國之寶也安肯棄之餘則唯命是聽遂堅壁光圍久之王城益急什請曰豈以貧道一人之故而舉國受困非利也願請以行王不聽什曰會當歸耳王無已遂遣師同光行是謂揚湻風於東扇也光至涼聞姚萇弒堅自立國號後秦光亦據涼自王國號西凉時什師未及入秦遂居於凉光無良多困辱師無以自見故曰將爰燭殊方而未顯留滯於凉故曰匿耀凉土以既來而致困其道不行故曰道不虗應應必有由矣弘始三年歲次星紀秦乘入國之謀舉師以來之意也北天之運數其然也此敘什師得時行道之由也姚萇弒堅在位八年而什師亦被困於凉偶堅領鬼兵入宮刺萇中陰出血石餘而崩子興嗣立降帝號而稱天王意蓋宗尊周制也改元弘始丑月為星紀以月紀年也什師在凉十一年矣時因殿庭生連理樹逍遙園葱變成芷咸謂智人入國之瑞知師在凉秦主乃遣姚碩德伐凉光已薨其子呂隆嗣立兵至大敗之隆即降遂表奉師至秦主深禮重焉故曰秦乘入國之謀舉師以來之大品云般若於佛滅後先至南方次至西方次至北方大盛於震旦震旦在天竺東北故曰北天之運數其然也謂法運時數當其然耳大秦天王者道契百王之端德洽千載之下游刃萬機弘道終日信季俗蒼生之所天釋迦遺法之所仗也此敘明時什師行道之會也天王乃興自稱故時並尊之百王指堯舜以下端謂百王首以無為為治也洽霑潤也意稱弘法之德流潤千載之下也游刃語出莊子庖丁解牛游刃其間乎有餘地此稱秦主才智有餘雖萬機叢錯迎刃而解有餘地故不妨弘道終日也謂此聖主信為末法蒼生之所天蒼生猶言赤子天稱父母為天謂養育羣生如一子也佛臨滅時將佛法付囑國王大臣非仗大力外護法難久住故為遺法之所仗也上敘弘法之主下敘弘法之事時乃集義學沙門五百餘人於逍遙觀躬執秦文與什公參定方等其所開拓者豈謂當時之益乃累劫之津梁矣此敘秦主弘法之事也逍遙觀乃秦主游宴之所什師至國遂延於此中以譯諸經後因秦主賜什宮人乃別搆草堂以居之即今之草堂寺什師宣梵秦主親執文對譯方等諸經乃所譯也開拓如開疆拓土以佛法初開荒邈不唯以益當時實為累劫之津梁也余以短乏曾廁嘉會以為上聞異要始於時也此論主自敘聞法之時也短乏謙辭謂才短德乏濫廁嘉會上聞船若玄旨異常心要始於此時也上敘來義下顯正宗然則聖智幽微深隱難測無相無名乃非言象之所得為試罔象其懷寄之狂言耳豈曰聖心而可辨哉試論之曰正宗之初據理出意將欲制論先示般若玄旨非言論可及也經云諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知不退菩薩亦不能測故曰聖智幽微深隱難測般若之體離相離名豈言象之所得哉今欲論之試罔象其懷寄之狂言耳罔象語出莊子黃帝遺其玄殊使智索之而不得使罔象索而得之謂虗無其懷乃可與智相應也狂言亦出莊子謂大而無當之言蓋謙辭也意謂試以狂言擬之非敢謂聖心可辨也放光云般若無所有相無生滅相道行云般若無所知無所見此引二經以定宗也放光即大品也兩譯文異二十卷云般若無所有相第十五云般若波羅蜜不生不滅相道行第一云般若當從何說菩薩都不可得見亦不可知此約義引也以般若體絕諸相故云無所有相寂滅湛然故云無生滅相真知獨照故無所知絕諸對待故無所見般若如此豈名言之可到哉下依宗辨用此辨智照之用而曰無相無知者何耶果有無相之知不知之照明矣此徵顯般若實相之體以為發論之端也此者指上引二經乃辨智照之用既有智有用則應有相有知可也而云無相無知者何耶由是觀之實有離相之知亡知之照明矣但非心識思量可及也何者微顯上義夫有所知則有所不知此凡情也以聖心無知故無所不知不知之知乃曰一切知故經云聖心無所知無所不知信矣此徵明無知之義也約理而推夫有所知之境則滯於一緣則有不知之地此心境未泯對待未忘乃凡情也擬之聖心則不然以聖心虗靈絕待境智雙忘能所俱絕是為無知以無知之知光明徧照故無所不知以不知之知故曰一切知故思益經云聖心無所知無所不知信矣由無所知故無所不知耳豈有心之知而可及哉是以聖人虗其心而實其照終日知而未嘗知也故能默耀韜光虗心玄鑒閉智塞聰而獨覺冥冥者矣此釋聖心無知之所以也以聖人惑無不盡故虗其心真無不窮故實其照此實智內證也由內證之實故權智外應則終日知而未嘗有其知也由其體用雙彰權實並運故能默耀韜光不用其知虗心玄鑒故無幽不燭所以外應羣動則忘知泯照閉智塞聦不有其知而內與理冥真知獨照故曰獨覺冥冥此所謂無知無所不知也然則智有窮幽之鑒而無知焉實智內證神有應會之用而無慮焉權智外應神無慮故能獨王於世表智無知故能玄照於事外此分別觀照以顯權實二智也實智照理故有窮幽之鑒照體獨立心境兩忘故無知焉神權智也俯順羣機故有應會之用無思而應故無慮焉無思而應則物不能累故獨王於世表智無知則境與心會觸事而真故能照於事外是以不住無為不捨有為權實雙彰齊觀並照此聖人之心也智雖事外未始無事神雖世表終日域中所以俯仰順化應接無窮無幽不察而無照功斯則無知之所知聖神之所會也此釋成二智並運之所以也以觸事而真故智雖事外而未始無事以神雖世表不捨度生故終日域中由夫二智齊觀所以聖人俯仰順化故權智應接無窮而不累實智無幽不察而無照功此其所以為聖智無知之所知乃聖智神心之所冥會也以此而觀聖心則般若之旨昭然矣然其為物體也也實而不有虗而不無存而不可論者其唯聖智乎此申明般若體絕有無也般若本有真實之體但無相而不可見故云實而不有虗靈湛寂而照用常然故云虗而不無存而不可論者義引莊子六合之外聖人存而不論以明般若非常情知見之境故但當存之而不可論以非言可及也何者微也欲言其有無狀無名欲言其無聖以之靈此明般若不屬有無也欲言是有則無相狀而不可以名貌欲言其無而聖人玄鑒萬機應用不缺故不可以有無名也聖以之靈故虗不失照無狀無名故照不失虗此下明般若寂照一源體用雙彰權實並顯也虗不失照則寂而常照故體不離用照不失虗則照而常寂用不離體照不失虗故混而不渝虗不失照故動以接麤此正明權實並著也由照不失虗故權智外應混融萬物而其體湛然而不變渝變也由虗不失照故實智內證而不捨度生麤謂現身三界隨類而應是以照彌深用彌廣是以聖智之用未始暫廢求之形相未暫可得此結成寂照同時之義也由其權實不二故聖人彌綸萬有潛歷四生未曾一念捨眾生界其實求其智用之跡而不可得故寶積曰以無心意而現行放光云不動等覺而建立諸法所以聖迹萬端其致一而已矣此引二經結成寂照一源之義也若聖人有心作為則有形相而可得由無心意而現行故現身如水月說法如谷響雖可見可聞其實求之而不可得由不動等覺而建立諸法故不離當處而法界彌綸所以聖迹萬端皆法身彌布故云其致一而已矣是以般若可虗而照真諦可亡而知萬動可即而靜聖應可無而為斯則不知而自知不為而自為矣復何知哉復何為哉此總結般若寂照不二存泯互融也由上論聖心如此體用雙彰故般若體雖至虗可以即虗而照亡絕也真諦之境雖絕相可以即絕相而知萬動雖紛可以即動而靜聖應雖無為可以即無為而為如此則聖智不知而自知不為而自為矣由其存泯互融故體用不二也上顯雙存下顯雙泯復何知哉復何為哉其實無知無為也上本論竟下問答決疑有十八段難曰一有知不矜難由前云智有窮幽之鑒而無知焉神有應會之用而無慮焉故躡此二句以興難意謂既有知有會豈可言無知無會也但聖人有知而不矜耳夫聖人真心獨朗物物斯照應接無方動與事會物物斯照故知無所遺萬境齊觀動與事會故會不失機有感即赴上領旨也下敘計會不失機故必有會於可會謂必定有機可會知無所遺故必有知於可知謂必有能知之心知於可知之境必有知於可知故聖不虗知必有會於可會故聖不虗會謂既有知有會必有可知可會之境此則知不虗知會非虗會矣下正難既知既會而曰無知無會者何耶此正申難也既有知有會而曰無者豈不謬耶下敘救若夫忘知遺會者則是聖人無私於知會以成其私耳此敘救也謂若以忘知遺會為救者則是聖人雖有知會而不自矜恃為己能返以成其知會之名耳無私成私語出老子後其身而身先外其身而身存不自貴愛其身而身返存謂聖人但以不矜其知會為己私故人以知會歸之其實非無知會也斯可謂不自有其知安得無知哉此轉破也謂如所救云聖人不矜恃知會為己長斯可謂不自有其知豈得謂無知哉下約知無知相答答曰約真諦可亡而知以答先立理夫聖人功高二儀仁也而不仁大仁不仁明逾日月而彌昏功高謂權智應物明逾等謂實智證真無為而應故不仁不慮而知故彌昏豈曰木石瞽其懷其於無知而已哉此揀異無情也若謂無知不同於木石誠以異於人者神明故不可以事相求之耳此揀異有情也若謂有知不同凡夫子意欲令聖人不自矜恃有其知而聖人未嘗不有知此牒審難意若以此為得者無乃乖於聖心失於文旨者乎總責不但不知聖心抑且失於文旨何者徵釋通難經云真般若者清淨如虗空無知無見無作無緣斯則知自無知矣豈待返照絕無然後無知哉此引經證成般若但無惑取之知非絕無真知也義引大品等文言真般若者意在離妄以體絕纖塵故清淨如空以無惑取故無知無見以非有為故無作無緣以此而觀則般若真知獨照知自無知耳豈待泯絕靈明然後為無知哉若有知性空而稱淨者此牒轉救也謂若以般若實實有知但以性空而稱淨者則不辨於惑智此返責也謂若以般若性空為淨者則不辨於惑智以煩惱亦性空豈稱般若哉三毒四倒亦皆清淨有何獨尊於般若若謂般若以性空為清淨者則三毒四倒亦皆性空如此則真妄不分有何獨尊於般若哉若以所知真諦美般若此敘轉救也謂若以所知之真諦清淨以此美般若為清淨者所知真諦非般若真諦為所觀之境般若為能觀之心心境不一故非般若所知自常淨故般若未嘗淨謂若以真諦清淨美般若者然在真諦體固常淨今為所觀則對待未忘是般若未嘗淨則是真諦返累於般若亦無緣因也致淨歎於般若若真諦有累於般若則亦無因以淨致歎於般若下正釋然經云般若清淨者將無豈非以般若體性真淨本無惑取之知本無惑取之知不可以知名哉此正釋經義也經云般若清淨者豈非以般若性淨本無惑取之知既無惑取之知是不可以真知名哉但無妄知非無真知也如此豈唯無知名無知知自無知矣何獨以絕然無知為無知良以真知自無妄知耳是以聖人以無知之般若照彼無相之真諦真諦無兔馬之遺般若無不窮之鑒所以會而不差當而無是寂怕無知而無不知者矣此結答問意也謂能觀之智無知所觀之理無相以無知之智照無相之理故心境如如一道齊平所以理絕三乘之跡兔馬三乘淺深之喻也而般若照徹無餘故無不窮之鑒如此所以權智應會羣機而不差觸事當理而無是實智則寂然不動怕然無為故無知而無不知矣聖智如此豈以不矜其知為無知又豈絕然無知為無知哉難曰此二名互違難問家約俗諦以名求實以難名實相違下約二名順成以答夫物無以自通故立名以通物物本非名因名以達物物雖非名果有可名之物當於此名矣名不虗召必有物以當之如呼甲乙則有人以應之是以即名求物物不能隱此立理也以俗諦有名必有物設難般若既有其實而今云無知者是空有其名而無實也次申難而論云聖心無知又云無所不知此出互違意謂無知未嘗知知未嘗無知斯則名教之所通立言之本意也難者意若言無知則未嘗有知若言有知則未嘗無知此是名教立言之旨也然論者欲一於聖心異於文旨尋文求實未見其當此正相違也若聖心是一則不應名異何者若知得於聖心無知無所辨若無知得於聖心知亦無所辨若二都無得無所復論哉此徵難聖心定應居一也謂知契於聖心則不必言無若無知契於聖心則不必言有若有無俱不契則無復置論矣今言知而無知二語相違豈正論哉答曰二名順成答約真諦無相故知不可以名求以破經云般若義者無名無說非有非無非實非虗虗不失照照不失虗斯則無名之法故非言所能言也此引經立理以遮難也然難者以名求實故責有無互違今引經義謂般若無名故不可以實求無說故不可以言得以有無虗實一切皆非但以體虗而不失照用雖照應萬有而不離真際此無名之法固不可以言傳也言雖不能言然非言無以傳是以聖人終日言而未嘗言也今試為子狂言辨之道本無言非言不顯聖人處絕言之道故終日言而未嘗言今試狂言以辨之蓋言其無言也夫聖心者下正答初顯聖心有無雙絕以遣名微妙無相不可為有聖心實智離相不比俗諦可以名求用之彌勤不可為無權智應用會不失宜不比外道斷滅不可為無故聖智存焉靈知獨照不可為有故名教絕焉但以虗而照物雖大用昭昭而言詮不及名言路絕是以言知不為知欲以通其鑒以虗而照所以言知不是真箇有知但假知字以通曉其鑒照之用耳不知非不知欲以辨其相言不知不是絕然無知但以無字以辨無惑取之知相耳辨相不為無但無妄知之相不是絕無真知通鑒不為有但以虗而照物故非有知之可取非有故知而無知以真照體虗故雖知而無知非無故無知而知言非無者以無妄知故真知彌照是以知即無知無知即知無以言異而異於聖心也良以聖心真窮惑盡真知獨照不墮有無豈可以遮遣之寄言而異於聖心哉難曰以緣會求知難謂真諦為所緣之境既有所緣定有能緣之智非無知也夫真諦深玄非智不測聖智之能在茲而顯言非智不能照真諦故經云不得般若不見真諦真諦則般若之緣也境知歷然以緣求智智則知矣謂真諦為所緣之境般若乃能緣之智以緣求智智即知矣豈無知哉此以心境對待立難答曰此以非緣無知答意謂真諦離緣故智亦非知以緣求智智非知也此牒難斥非也謂若就緣以求智然真諦離緣故智亦非知何者徵釋放光云不緣色生識是名不見色文云不以五陰因緣起識者是名不見五陰謂不因五陰起分別者以離身心故不見身心相此則離緣之知不可以緣求也又云五陰清淨故般若清淨清淨者空之異稱以五陰本空故般若亦空空則離緣非有知也般若即能知也五陰即所知也所知即緣也此楷定知緣以明離緣無知也謂若以緣求知今般若乃能緣之知五陰乃所緣之境今云五陰本空則非所緣也所緣既空則能緣亦空以空則非有所知由照見皆空故知即無知但不從緣耳夫知能知之心與所知所知之境相與待也而有相與而無相與而無故物物字通該心境莫之有心境皆真故不有相與而有故物莫之無心境角立故對待不無物莫之無故為緣之所起心境未忘則妄緣斯起物莫之有故則緣所不能生心境兩忘則照體獨立不因境有不借緣生緣所不能生故照緣而非知以離緣之智照寂滅之境故非有所知為緣之所起故知緣相因而生以對緣所起之妄心故心境未忘知緣相因待而生此妄而非真下雙結釋成是以知妄知與無知真知生因也於所知境通真妄矣釋上心境相待而有故妄心取相故有知以真知離緣故無知此所以知與無知皆因心境但有取不取耳何者通徵真妄夫智真智以因也知所知之境取相故名知以有對待故名妄知真諦自本來無相無相可取真智何由知以真諦離相故真智無知以無緣故無知也次真妄各辨初辨妄所以然者釋真妄各有所以夫所知之妄境非所知以妄境本空故本非所知所知之妄境生因也於知能知之妄心所知妄境既生知妄心知妄心亦生所知妄境所妄境知妄心既相生妄心妄境相因而生相生即緣法心境相待因緣而生故對待未忘是為緣法緣法故非真緣生之法假而非真非真故非真諦也難家以真諦為所緣之境今答以緣生乃妄法非真諦也何為所緣故中觀云通證真妄物從因緣有故不真此證緣乃妄法不從因緣有故即真此證離緣乃真下顯真今真諦曰真真則非緣真則不借緣生真非緣真諦既非緣故無物從緣而生也前難家以緣真諦故以般若為有知今論主答以真諦離緣離緣之真諦豈能生般若之知哉從緣應云從非緣謂無有一法從非緣而生者意責難者不達真諦離緣而妄擬也故經云不見有法無非也緣而生證成上義非緣不能生物則真諦離緣必不生知矣是以真智觀真諦未嘗取所知謂真智照真諦未嘗取為所知之境智不取所知此智何由知謂真智既不取所知之境則此智何由而知哉然智非無知此遮過也謂真智但不取所知之境耳非是絕無知體也良以獨照為知非有待也但真諦非所知但真諦無相非所知之境耳故真智亦非知由真諦非所知故真智亦非知此二句結盡般若無知之妙下返責而子欲以緣求智故以智為知然智無分別知有分別以知為智則真妄不分何以興難緣自非緣於何而求知由難意以緣求知今答以真諦離緣然緣本非緣向何而求知哉此則境智雙忘能所齊泯般若玄旨妙極於斯難曰前云不取之知今以有知無知不取皆非二義雙關難論云不取者牒論申難為無知故不取為知然後不取耶立定下難若無知故不取聖人則冥若夜游不辨緇素之異耶此則瞢然無知若知然後不取知則異於不取矣謂若有知則有所取之物此則既已有知難言不取矣上以心境兩異難下以心境冥一答答曰有無雙非不取以答非無知故不取又非知然後不取有無皆非不取知即不取故能不取而知此明兩是謂由知處當下不取故能不取而知難曰因聞上心境皆非故約不取心境俱成斷滅以難論云不取者誠以聖心不物不取著也於物故無惑取也上立理下申難無取則無是是者印可於物不繆之稱能知之心也無是則無當當者應物不謬主質不差言所知之境也誰當聖心謂無境可知誰當聖心無境可當豈非斷滅而云聖心無所不知耶謂無境可當聖心則絕然無所知矣而云無所不知豈不謬耶答曰以是當混成答然縱可之辭無是無當者牒難意夫無當則物無不當言當者當心之境也若一境當心則滯而不通若無當心則境寂心空真心任徧知故無物不當無是則物無不是謂無能取之心則心空境寂法法皆真故物無不是物無不是故是而無是了境唯心則心境兩忘是非齊泯故是亦無是物無不當故當而無當以唯心之境則更無心外境能與心為緣故雖照境而萬法皆空故當而無當故經云盡見諸法而無所見以萬法唯心則無一法可當情者故盡見諸法而無所見難曰聞心境俱泯遂疑捨有入無故以立難聖心非不能是誠以無是可是敘聖心捨有以領旨也雖無是可是縱成故當是於無是矣以為入無是以經云真諦無相故般若無知者引證無知此述領意誠以般若無有有相之知此釋經正義下以謬解申難若以無相為無相有何累於真諦耶意謂若以有相累於般若今若以無相為無相又何累於般若耶此不達般若真知獨照故以絕無為般若答曰難以捨有入無答以兼亡無相聖人無無相也難家認取無相答以無相亦無總答問意也何者徵釋無相亦非若以無相為無相若認著於無相則心有所住聖心則不然無相即為相若取著無相則無相亦成相永嘉云棄有著空病亦然捨有而之無譬猶逃峰而赴壑俱不免於患矣猶如避溺而投火此外道斷滅也聖心豈然哉下申聖心無住是以至人處有而不有居無而不無雖涉有無而不住有無所謂二邊不住雖不取於有無然亦不捨於有無有無不住中道亦不安所以和光塵勞老子曰和其光同其塵周旋五趣此能有為寂然而往不動本際應現一切怕爾而來萬化不遷冥心絕域恬淡無為而無不為聖人以無住為心豈可以有無而擬之哉難曰難以權智生滅以不達動靜一如故立此難聖心雖無知然其應會之道不差此領旨也是以可應者應之不可應者存之此疑聖心有揀擇可否故以為有生有滅然則聖心有時而生有時而滅可得然乎不了生本無生故立此難答曰答以聖心本無生滅生滅者生滅心也此凡夫心也聖豈然哉聖人無心生滅焉起真顯無生然非無心不同木石無情但是無心心耳但無生滅之心為心耳又非不應不同孤吊但是不應應耳但是隨感而應本無將迎之心也是以聖人應會之道則信若四時之質質實也由聖人之心無緣應物感而遂通如谷響水月故信如四時之實應不失時直以虗無寂滅為體斯不可得而生不可得而滅也以寂滅真知隨緣應現故本無生滅難曰聞無生滅不達惑智俱空故以申難聖智之無惑智之無前云聖智無惑取之知故疑惑智之無俱無生滅何以異之謂根本實智靈鑒獨照本自無知故云聖智之無後得權智照破無明妄惑本空故無惑取之知二者皆無不識無義何辨故此興難答曰先智惑雙辨示空義之淺深聖智之無者無知真知獨照心境兩忘故云無知惑智之無者知無權智照破惑取之妄知本無故曰知無其無雖同所以無者異也聖知天然無知不假功勳惑智因修而得故無意雖同所以則異何者徵釋不同夫聖心虗靜無知可無可曰無知非謂知無聖人真心獨朗寂然不動絕無妄法故無知可無但可曰無知不可言知無惑智有知故有知可無可謂知無非曰無知也後得照惑了妄本空但可言知妄元無不可言無知無知即般若之無也般若本絕諸妄故不可說知無知無即真諦之無也知無者謂知真諦無妄知也是以般若之與真諦此下心境合明會寂用之同異先同異雙明言用即同而異即寂而照言寂即異而同即照而寂同故無心於彼此心境也同則心境雙泯異故不失於照功境智歷然是以辨同者同於異同其所不同辨異者異於同異其所不異此則心境俱存照用同時斯則不可得而異不可得而同也以俱非雙泯故不可以同異定名何者微辨寂用內有獨鑒之明照體獨立寂也外有萬法之實萬法皆真用也萬法雖實然非照不得萬法雖真非智照不得其實內心也外境也相與以成其照功智得境而照用全彰境得智而真常獨露故云內外相與以成其功此則聖所不能同用也非境無以顯智故不能同內雖照而無知非有對待之知外雖實而無相諸法實相不可以相求故云無相內外寂然內智無知外境無相心境雙泯故曰寂然相與俱無由心空故境寂以境寂故心空故心境相與一道齊平此則聖所不能異寂也寂則心境雙亡故不能異是以經云諸法不異者豈曰續鳧截鶴夷嶽盈壑然後無異哉引證本來不異也大品云諸法無相非一相非異相豈曰下引釋不異莊子曰𠒎脛雖短續之則憂鶴脛雖長斷之則悲謂天生長短不必裁齊嶽高壑下本來自定不必夷嶽之高以填壑之下意引諸法當體真常本無差別所謂是法住法位世間相常住不待造作然後齊平謂若以不二之智照一真之境故法法真常本來不異斯則自然不異非安排而後不異也誠以不異於異故雖異而不異也不以境異而異其心故境隨心一即異而同故云雖異而不異故經云甚奇世尊於無異法中而說諸法異謂依一真法界演說無量差別法門故云無異法而說異法又云般若與諸法亦不一相亦不異相信矣引證不一不異大品云世尊云何於無異法中而說諸法異又云諸法無相非一相非異相是知諸法一異乃外道邪見以般若而觀則非一非異實相般若理極於斯難曰因聞寂用遂疑有二故此立難論云言用則異言寂則同未詳般若之內則有用寂之異乎不達動靜一源故疑寂用兩殊答曰答以寂用一致用即寂寂即用用寂體一同出而異名同出異名語出老子彼意有無同出一玄此言寂用本乎一心但約動靜言之耳更無無用之寂而主於用也言寂體必有照用如明鏡之光未有光明之鏡而無照者是以智彌昧照逾明此言實智照理泯絕所知故彌昧真明逾發故照逾明此言即寂之用也神彌靜應逾動由實智彌寂故權用無方此言用不離體故云應逾動豈曰明昧動靜之異哉總結寂用不二故成具云不為而過為此證權智即實之權寶積曰無心無識無不覺知此證離妄之智顯即寂之用斯則窮神權智應物盡智實智照理極象外之談也釋引二經雙明寂用乃極象外之談即之明文聖心可知矣以此而觀羣疑冰釋矣般若無知論終
