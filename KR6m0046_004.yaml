body:
  text: 明匡山沙門憨山釋德清述劉遺民書問附遺民和南按新疏公名程之字仲思別號遺民謂遺逸之民彭城人漢楚元王之裔外善百家內研佛理嘗為柴桑令值桓玄僭逆初萌乃歎曰晉室無盤石之固蒼生有纍卵之危因與儒者次宗宗炳周續之等皆當代名流事遠公於廬山稱十八賢精結蓮社辟命弗顧太尉劉裕見其野志沖邈乃以高尚相禮時生法師入關就學於什師與論主莫逆生公南返乃以前論出示廬山社眾遺民覽之歎服因呈遠公公歎曰未曾有也雖遺民致問亦遠之深意也頃䬸味也徽美也聞去聲名也有懷遙佇企望也歲未寒嚴體中如何音寄壅隔增用抱蘊弟子沈痾草澤山野也常有弊瘵耳因慧明道人北遊裁纔也通其情將致問深旨先敘寒溫仰慕之懷也謂頃聞美名如飢渴之得飲食故曰䬸有願見之懷而不得但有遙想企佇時當歲末不審道體如何以乏便鴻故音寄壅隔不通日增積蘊之思顧以病臥草澤不能遠訪情向未達近因慧明北遊纔得一通其情此敘未見懷想之心如此古人不以形疏致思也淡悟涉則親是以雖復江山悠邈不面當年至於企懷風味鏡心象迹佇悅之勤良以深矣緬然無因瞻霞永歎順時愛敬冀因行李數有承問此敘慨慕之情也古人不以形迹疏遠而遂淡其致思苟心相契悟雖遠亦親是以山川雖邈遠昔年未面至若企仰懷慕道風法味心鏡照其像迹不越方寸故佇望之勤日益深矣此想慕之切也私心緬然不忘但無因一見瞻望秦嶺之煙霞益增長歎隨時愛敬之心不忘冀望乘往來行李之便願數有音問伏願彼大眾康和外國法師休納此祝願也外國法師常時休納福慶也以論主在譯場故問及大眾致訊本師也上人以悟發之器而遘茲淵對想開究之功足以盡過半之思故以每惟乖闊憤愧何深此歎論主遭逢之幸顧自愧也悟發之器謂論主先遇梵師持禪波羅蜜經梵本至秦論主從梵師得受禪訣有所開悟故稱悟發之器淵對指什師淵妙之思論主既已自悟又遇此良師想於般若開究之功以盡過半之思謂全了悟也故劉公慕此不能參預法會以自乖違闊遠憤愧何深耳此山僧清常道戒彌勵禪隱之餘則惟研惟講恂恂敬貌穆穆和也故可樂矣弟子既以遂宿心而覩茲上軌感寄之誠日月銘至瑤本作志此劉公自述慶幸法侶嘉會之辭也言道戒戒也禪隱定也研講慧也此三學精嚴六和修敬自遂生平而覩茲嘉範感託之誠指日月以銘心志遠法師頃恒履宜思業禪思道業精詣到也乾乾宵夕自非道用潛流理為神御孰以過順之年湛氣若茲之勤所以憑托身慰慰心既深仰謝逾絕此讚述遠公之高且述依托之志也履宜謂行履如宜禪思道業精嚴深到而又乾乾不息盡夜不懈如此操行若非道用潛流於心地至理神御於日用誰能以過耳順之年澄湛之氣若此之精勤有師如此故身有所托而心有所慰以畢所願故仰道謝世日遠逾絕此又劉公之所大慶幸也去年夏末始見生上人示無知論才運此疑作韻清儁旨中沈深淵允恰當推涉聖文婉而有歸披味殷勤不能釋手直可謂浴心方等之淵而悟懷絕冥之肆者矣若令此辨遂通則般若眾流殆不言而會可不欣乎可不欣乎此敘得論之由也謂從生公得無知論其才清儁其理深沈允當推釋經文辭婉而旨有歸趣披閱玩味殷勤再至不能釋手般若玄宗如眾流歸海如人浴海已沾百川之水浴心般若已得萬法之宗般若非見聞之境故稱絕冥之肆若使此論一通則般若引眾流將不言而會矣再言可不欣乎慶躍之至也夫理微者辭險由般若理微故設論辭險唱獨者應希如陽春雪曲和者應稀苟非絕言象之表者者指其人也若非心超象外之人定不能領會將以存象而致乖乎謂未能忘言得旨之人必執言以乖其理意謂答以緣求智之章婉轉窮盡極為精巧無所間然矣此許前論與理渾然無有間隙矣但暗者昧於理者難以頓曉猶有餘疑一兩一二今輙題之如別初別列問意今合歸篇中想從容無事之暇閒暇之時復能麤為釋之上敘起疑之由下正敘疑文論序云般若之體非有非無真俗雙泯虗不失照照不失虗寂照同時故曰不動等覺而建立諸法下章云異乎人者神明故不可以事相求之耳上總敘實智之文又云用即寂寂即用神彌靜應逾動此敘權智之文下就敘論意先權實雙標夫聖心冥寂理極同無此敘實智意不疾而疾不徐而徐此敘權智意是以下釋成權實一致知不廢寂權即實寂不廢知實即權未始不寂未始不知權實雙彰二智並運故其運物成功化世之道雖處有名之中而遠亦作宛與無名同謂由寂照同時故權智應機化世而遠與實智理冥是以二智無殊上敘申論意微妙下敘迷昧者不了玄旨斯理之玄固常所彌新疏作迷昧者矣上敘論文立意權實不異下出疑設難二智體殊但今談者所疑於高論之旨欲求聖心之異以論說聖心冥一故今疑者按權實二智以求聖心之異故下正難二智體殊為謂窮靈瑤本作虗極數妙盡冥符耶此正難意云所言二智不異者為是般若證窮真諦之虗斷盡俗諦有為之數妙盡冥符合而為一耶此難實智冥真絕俗也為將心體自然靈怕獨感耶難意謂般若之用不在窮虗極數當體虗怕無相獨存耶此難疑無權智也上申疑立難下出過若窮靈作虗極數妙盡冥符謂心境既合為一則不應存寂照二名則寂照之名故是定慧之體耳然寂照二名體用不一則所成之定慧既二則寂照亦二用既二則體亦二安可言心境冥一也此則二名不應一體也若心體自然靈怕獨感是所謂神彌靜乃返一絕跡有體無用如何又有權智耶則羣數之應固以幾乎息矣若有體無用則權智已絕又何言應逾動耶上雙難權實下潛難無知夫心數既玄則寂然無知矣而又云孤運其照然照則知矣何言無知神湻化表而慧明獨存言神既湻恬於萬物之表此則絕於應而慧明獨存則不合有應有應則二知矣既有二知則一知照真一知明俗何謂無知當有深證可試為辨之辨上權實不二真智無知下難不取意謂實智可不取權智則非不取也疑者當以撫會應機覩變之知不可謂之不有矣謂權智應機必定有知而論旨云本無惑取之知本論謂權智無惑取之知而未釋解也所以不取之理意謂權智應機必有知有知必有取而言不取故未解也下兼難心異謂宜先定聖心所以應會之道謂以二語楷定聖心即下云為當唯照無相耶由上立難權智有取故今輩就權智以難聖心有二為是權智觀物唯了物體惟空本無相耶此審定無相為當咸覩其變耶為是權智應物覩其萬化皆有相耶此審定有相下難若覩其變則異乎無相謂若唯覩其萬變有相可撫則異乎無相若唯照無相則無會可撫謂若唯照性空則萬境斯寂故無會可撫既無會可撫而有撫會之功意有未悟幸復誨之言既無會可撫則機緣已絕可言不取而又言有撫會之功有撫則何言不取耶意謂聖心若一定應得一失一若二諦俱得則權實兩殊故此難之下難是當先舉疑文論云無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當上引論文下就許是當夫無當而物無不當乃所以為至當無是而物無不是乃所以為真是上就許是當下難相違豈有真是而非是至當而非當而云當而無當是而無是耶上難相違下敘救轉非若謂至當非常泛常當真是非常泛常是此蓋悟惑之言本異耳至當真是乃悟者所見常當常是乃惑者所執故言不同而義未決固論旨所以不明也願復重喻以祛其惑矣請決所疑下難以結意論至日即與遠法師詳省之法師亦好相領得意言遠公亦相得意許可但標位似各有本遠宗法性什宗實相故各有本或當不必理盡同矣此一語足見遠民見理未真頃兼以班諸有懷謂以論班示同志屢有擊其節者謂賞音識趣者而恨不得與斯人同時也凡見斯論者無不願見而不可得也答劉遺民書書有二幅前短札後長幅不面在昔佇想用勞言與遺民自昔未面故但勞佇想耳慧明道人至得去年十二月疏并問劉公前書托慧明寄至披尋返覆詳省來問欣若暫對涼風屆節頃常如何此敘寒溫貧道勞疾多不佳耳信信乃使者南返不悉此敘意下正答八月十五日釋僧肇疏答服像雖殊妙期不二服像言儒釋雖不同若妙悟心期則本來不二江山雖緬遠也理契則鄰江山雖遠若忘形契理則萬里非遙所以望途致想虗襟有寄言與劉公心神契會所以屬望長途虗懷有託君既遂嘉遯之志嘉遯周易遯卦爻辭又云肥遯言高尚隱逸也標越俗之美獨恬事外歡足方寸此歡劉公匡山蓮社已遂隱逸之志標越塵俗之美名獨享世外之樂其歡足內心每一言集每與南來之人一言集會之間何嘗不遠喻林下之雅詠來人一言話間未嘗不遠領林下之雅詠謂時領社中名公著作也高致悠然此讚所聞諸作則知高尚之思悠然可想清散未期言慕社中清勝君子蕭散之懷未期佳會厚自保愛此囑劉公加餐之意每因行李數有承問因往來人數得劉公音問願彼山僧無恙道俗通佳酬前大眾康和但社有宰官居士故併問道俗承遠法師之勝常此酬前外國法師當休納以為欣慰喜法師勝常足以慰心雖未清承然服膺高軌企佇之勤為日久矣敘仰慕遠公之情雖然未承清範而服膺懷德仰其高䠱瞻慕之心非一日矣公以過順之年湛氣彌厲下酬敘遠公近履佳況前云遠公湛氣若茲之勤故因歎云過順之年澄湛之氣彌厲益嚴勁倍常所謂老當益壯養徒作養徒眾幽巖抱一凝神沖空虗谷遐邇仰詠遠近仰高誦德何美如之歎遠公美德無以過之每亦翹想一隅懸庇霄岸言翹想遠公天各一方霄岸猶言天際言懸遠托庇蔭於天際無由寫敬懷慕之心布敬無因致慨良深言懸想而不及見慷慨之念實深君清對終日快有悟心之歡也酬前憑慰既深謂慕遠公之高恨不及見君幸終日清對且喜有悟心之快即此大眾尋常如常什法師如宜正答休納秦王道性自然此下敘國王外護三寶正隆天機邁俗言秦王向道之性不勉而能天機超俗不以有國為榮城塹外護三寶弘道是務言不以國事為累但終日弘道由使異典法寶即下敘新經勝僧僧寶即下敘諸師方遠而至自西竺遠來靈鷲之風萃於茲土佛居靈鷲之風什師入關三寶聚於此土領公支法領也遠公弟子遠舉乃千載之津梁也頌公往西域取經故云遠舉於西域還得方等新經二百餘部遠公使領公往西域取經所取方等諸經按新疏云華嚴梵本亦領公尋至恨無正傳請大乘禪師一人禪師名佛陀婆陀羅此云覺賢賢學禪業於罽賓佛大仙弘始中入秦於瓦官寺教習禪道江南慧嚴慧觀關中玄高等皆從師受業論主亦在其中故劉公稱云悟發之器三藏法師一人名弗若多羅姚興待以上賓之禮令譯十誦未竟而終毗婆沙法師二人一名曇摩耶舍一名曇摩掘多以善通此論故以為名什法師於大石寺出新至諸經諸經或諸師齎來或領公所取皆一時至故云新至法藏淵曠淵深廣大日有異聞時聽誦譯禪師於瓦官寺教習禪道門徒數百夙夜匪懈日夜參求邕邕和也肅肅敬也致可欣樂由是而知達磨未來已前禪道已行學者不少論主蚤以從修禪業有所悟入觀論旨幽玄非悟何以至此三藏法師於中寺出律藏本謂四重等末謂餘篇精精詳悉盡悉若覩初制若覩如來初制之日毗婆沙法師於石羊寺出舍利弗阿毗曇小乘論名胡本梵本雖未及譯時問中事發言新奇此上敘譯場近來諸經及西來諸師足見一時法運之盛故特以相聞貧道一生猥參嘉運遇茲盛化自恨不覩釋迦祇桓之集餘復何恨論主自慶時清道泰明主弘法真師主盟聖典遠臻勝友雲集可謂一時之盛何幸參預嘉運過茲盛化所恨不覩祇園親承佛會餘復何憾而慨不得與清勝君子同斯法集耳此以不得劉公同此法集良以為慨耳生上人頃在此同止數年什公門下弟子有生肇融叡稱為四哲時美其盛謂通情則生融上首精難則叡肇第一或云觀公至於言話之際常相稱詠詠誦也謂常稱誦匡山之盛中途還南因譯涅槃經至闡提無佛性義生公曰蠢動含靈皆有佛性闡提雖不信有時善根發現何以言無佛性想經來未盡耳眾皆不然生公遂去譯場故云中途南還君得與相見來書云始見生上人示無知論故云相見未更近問惘悒何言言生公去後更無近問中心惘悒言思慕不忘也威道人至自蓮社來得君念佛三昧詠并得遠法師三昧詠及序言劉公作念佛三昧詩遠公亦作且更有序威道人持來故得一見此作興寄既高辭致清婉此美念佛三昧之作托興寄心已高而文辭清爽致思微婉能文之士率稱其美言關中能文之士相率皆稱其美可謂游涉聖門扣玄關之唱也稱其能以文辭發揮佛理故云游涉孔聖之門而扣法界玄關之唱非空談也君與法師當數有文集因來何少因見念佛詠序則知公與遠公文集當多而見寄何少耶什法師以午年弘始八年歲次丙午出維摩經貧道時預聽次什師譯維摩且譯且講故云時預聽次參承之暇輙復條記成言謂參承講說之暇復條記什師現成之言以為注解此言註雖出肇手而義則本乎什師辭雖不文然義承有本論主自謙維摩注解辭雖不文而義則承本什師今因信使者持一本往南君閑詳言劉公閑於文字詳於義理試可取看已上敘彼此一往之事以通其情此下方敘來問發起來問婉切謂劉公五難辭婉而義切難為郢人論主自謙謂難與劉公敵手郢人事出莊子謂郢人堊漫其鼻端若蠅翼使匠石斲之匠石運斤成風盡堊而鼻不傷郢人立不失容此匠石揮斤之妙固難其人而郢人立不失容更自難得言承當之難也貧道思不關微言入理兼拙於筆語謂不但思不入理兼且拙於文字且至趣無言言必乖趣至理無言言生理喪云云猶嘵嘵不已竟何所辨言不及理辨之何益聊以狂妄言言示詶來旨耳莊子云吾與汝妄言之汝亦妄聽之疏云稱聖心冥寂理極同無雖處有名之中而遠與無名同斯理之玄固常彌昧者上牒來疏所引論辭以此為懷自可忘言內得取定方寸此許其所得自可忘言內證取定一心復何足以人情之所異而求聖心之異乎此責其不能忘言復以常人之情而求聖心之異疏曰下舉難出意談者謂窮靈極數妙盡冥符則寂照之名故是定慧之體耳寂照下出難若心體自然靈怕獨感下出難則羣數之應固以幾乎息矣上牒難下出意意謂通下句妙盡冥符心境合一則寂照雙絕不可以定慧二法為名意謂靈怕獨感則靈絕待不可稱羣數以息却不知兩言雖殊妙用常一迹我而乖在聖不殊也上以正意責迷何者徵釋無異先示定慧同源夫聖人玄心寂體默照照用理極同無照極則兩忘同一真源既曰為同同無不極既同一源則無有不極下責迷何有同無之極而有定慧之名此出正義下釋伏疑云定慧既一何故前云寂即用用即寂定慧之名非同外之稱也謂寂照既同一源則知定慧本同一體豈同外別稱定慧之名耶若稱生同內有稱非同謂若定慧之名生於同內則凡涉名言則非真體若稱生同外稱非我也謂於同外強稱定慧之名則是迷者妄執在我般若體中本無定慧二名上答定慧不二下答權應不息又聖心虗微妙絕常境妙盡冥符此言實智無為次言權應不息感無不應會無不通冥機妙智潛運其用不勤權智妙應而無不為如此羣數之應亦何為而息耶上明實智無為權應不息下答二智體殊正答心異兼通有知先標妄且夫心之有也凡夫妄心之有以因也其有有有待緣而後有有不自有以待緣而有故不能自有故聖心不有有此顯真也以聖心離緣故不有有不有有故有無有以不借緣生故雖有而非有有無有故牒上則無無既已非有則亦非無無無故牒上聖人不有不無雙絕有無冥心一際不有不無其神乃虗以有無雙絕則虗靈獨照妙契中道何者徵起下即難就通正答心異以明雙非夫有下至廢用耶通為一唱二百零一字夫有也無也心之影響也影譬象響譬言言也象也影響之所攀緣也分別影響本無實法下正示雙非有無既廢絕也則心無影響影響既淪喪也則言象莫測心絕緣影則言象不及言象莫測則道絕羣方則心體離量道絕羣方故能窮靈極數窮虗則理極極數則妄盡窮靈極數乃曰妙盡真妄雙亡是非齊泯妙盡之道本乎無寄靈靈絕待故曰無寄夫無寄在因也乎冥寂權實一心寂照一體冥絕故虗以通之通者道達之意謂冥寂之體至絕離相若不假一虗字通之則人何以了悟妙盡存亦因也乎極數真不窮則妄不盡妄不盡則真不極極數故數以應之會萬物而為己故曰極數分身萬象法身普應故數以應之數以應之故動與事會權智應物感而遂通故云動與事會虗以通之故道超名外實智證理離名絕相故云道超名外下兼通有知道超名外因謂之無但離名相不是斷滅動與事會因謂之有感應在機隨緣而現故有非實有因謂之有者應夫作非字真實也有強謂之然耳彼指中道一心何然哉待機緣而有者應非實有但強謂之耳彼寂滅一心何嘗動而為有哉故經云引證無知聖智無知而無所不知無為而無所不為此義引般若諸文以證聖心權實不異有知無知本一致也此無言無相寂滅之道豈曰有而為有無而為無動而乖靜靜而廢用耶此據理責迷以結上義也而今談者此下正答有知潛答心異多即言以定旨責迷不能忘言會理尋大方而徵求也隅老子云大方無隅謂寂漠沖虗之般若而以有知無知求之正猶尋大方而求隅也懷前識以標玄前識者老子云前識者道之華而愚之始也謂分別惑取之知存執也所存之必當以妄執為必當是以聞聖有知謂之有心聞聖無知謂等同也大虗即謂冥然無知有無之境邊見有無斷常二邊所存豈是處中莫二之道乎上責偏見以明不異下示中道何者徵明空假以顯中道先空次假萬物雖殊然性本常一以性空故常一不可而物以緣生無性不可名物此示空義然非不物以無性緣生此示假義可物於物上物能取之心下物所取之境則名相異陳迷則能所未忘不物於物能所兩忘則物而即真不取無非幻故即物即真下正示中道是以聖人不物於物不取不非物於物不捨不物於物物非有也一心不生萬法自寂不非物於物物非無也森羅頓現萬境全彰以空有兩忘二邊自泯此約一心以顯中道下約境以顯中道非有所以不取以萬法本空無可取者非無所以不捨以法法即真故不捨一法不捨故妙存即真由不捨一法故法法即真不取故名相靡因心不附物則名相自空名相靡因非有知也無境可知妙存即真非無知也萬法唯心真照獨立故非無知故經云引證般若於諸法無取無捨無知無不知證明般若能所兩忘以顯中道此攀緣之外超妄想境絕心之域離心意識而欲以有無詰者不亦遠乎總責執迷請詰夫雙結有無陳有無者夫智之生也極於相內智乃六麤智相之智謂分別見也言分別知見因名相起法本無相聖智何知以萬法性空無相聖人無境當心又何所知世稱無知者謂等木石太虗無情之流世人謂無知將同無情靈鑒幽燭形於未兆道無隱機般若真智靈明鑒照無幽不燭一念未生已前十方三世圓明了了徹見萬法故道無隱機寧曰無知如此靈明為正徧知豈曰無知下為解偏滯且無知生起也於無知下無字誤應云無知生於有知謂無知之見起於有知二者相待其實有無俱無無無知也無有知也雙拂二見有無不立下顯雙非無有知也謂之非有是為寂體無無知也謂之非無是為照用所以虗不失照寂而常照照不失虗照而常寂怕然永寂湛然常住靡執靡拘不墮有無如此中道妙絕常情孰能動之令有靜之使無耶動不著有靜不著無故經云真般若者非有非無無起無滅不可說示於人一切皆非故不可說示何則徵釋經義言其非有者言其非是有凡佛言非者乃遮遣破執之辭非實法也且言非有者乃是遮執有者遮其不是實有耳非謂是非有不是說絕無也言其非無者言其非是無言其不是絕無非謂是非無不是說實有也非有說非有非非有也不是非有非無說非無非非無也不是絕無四句既離百非自遣是以須菩提終日說般若而云無所說此絕言之道知何以傳絕言之道非知見之境又何以傳庶參玄君子有以會之耳惟忘言者可以心會耳上雙通權實竟寂照有無二疑皆通下別答不取先廣答心異又云宜先定聖心所以應會之道為當唯照無相耶為當咸覩其變耶此敘來難前難意云權智有取為是唯照萬法性空無相耶為是權智應物覩其萬化皆有相耶來難二意一難有取二難心異今先答心異後答不取下出難意談者似謂無相與變其旨不一覩變則異乎無相照無相則失於撫會下責滯然則即真之義或有滯也出其難意謂二智不一然覩變則是有相異於無相矣照無相則不能應機異於有相矣是則空有不能雙照故責以不能即真故云滯也經云色不異空空不異色色即是空空即是色此下正答先引經定理以色空相即立意下反質之若如似也來旨觀色空時應一心見色一心見空此出迷滯下出違若一心見色則唯色非空若一心見空則唯空非色然則空色兩陳莫定其本莫定經中立言本意也下釋經意是以經云非色者誠以非此非乃破斥之義色於色謂凡夫執色是實有故以非破斥其執不非色於非色上非色謂破斥下非色謂虗空言但破其色執不非破虗空若非色於非色返釋謂若非破虗空太虗則非色虗空非色相非色何所明虗空既非色縱破何所發明乎下順釋若以非色於色上非色空也謂以空破於色相即非色空也不異色此空不異色非色不異色牒上空不異色色即為非色即了空不異色則色即是空矣下依經會理故知變即無相正覩變時即達無相無相即變正無相時不妨覩變羣情不同以機不一故教迹有異耳執無相者故說覩變執覩變者故說無相考之玄籍謂聖經本之聖意本其聖人說法之意豈復真實智偽權智殊心空有二境異照耶謂豈一心照無一心照有耶是以下依心照境以顯不異照無相實智不失撫會權智之功即實之權覩變動權智不乖無相實智之旨即權之實造有不異無雖適生死而不動本際造無不異有雖證涅槃而不捨度生未嘗不有未嘗不無有無雙照二諦恒存故曰不動等覺而建立諸法以此而推寂用何妨寂用二法有何相妨如之何謂覩變之知異無相之照乎據理責迷上廣答心異竟下略答不取恐談者脫或也謂空有兩心靜躁殊用故言覩變之知不可謂之不有耳上出迷執下正通前疑若能捨己心謂己見於封執取也內尋玄機至理於事外名相之外齊萬有於一虗等觀萬法一昧純真曉至虗法身無相之非無徧一切處者當言至人終日應會與物推移謂隨順周旋也乘運時也撫化未始為有也終日度生不見生之可度此正有無齊觀權實並運下結答返責聖心若此何有可取而曰未釋不取之理前別答不取竟下決釋是當又云無是乃所以為真是無當乃所以為至當亦可如來言耳上印許來意下示以忘情若能無心於為是而是於無是是者印物之心是於無是則照而常寂無心於為當而當於無當者當者當心之境當於無當則寂而常照則終日是不乖於無是不乖於是則心空終日當不乖於無當不乖於當則境寂但恐有是於無是執心未忘有當於無當執境未化所以為患耳但恐執著之情未忘所以為患耳何者徵明執著若真是可是至當可當此則心境未忘則名相以形生心取著故名相斯起美惡是生取捨情生則愛憎橫發生生奔競攀緣取境逐逐不休孰與止之自心妄動誰與止之此執著之患也是以聖人空洞其懷無識無知聖人心包太虗萬境斯寂然居動用之域而止無為之境處有名之內而宅絕言之鄉雖為而不為寂寥虗矌莫可以形名得超情離見非思量可知若斯而已矣聖心如此乃曰真是可是至當可當未喻雅旨也聖人心境兩忘而以是當求之所以未喻來旨也恐是當之生物謂之然乃凡夫取著之妄見彼自不然彼聖心非常情可測何足以然耳以凡情而謂聖心之必然何足以知之上通答隱顯五難竟下結示離言夫言迹之興異途之所由生也尋名執相者依言取義分別情生正智昧矣而言有所不言以言而顯絕言之道迹有所不迹兔不在蹄魚本非筌是以善言言者求言所不能言善迹迹者尋迹所不能迹得義忘言得魚捨筌至理虗玄擬心已差擬心即錯動念即乖況乃有言恐所示轉遠名相不忘於理轉遠庶通心君子有以相期於文外耳唯忘言者可以意得息慮者可以心通若執言競辨嘵嘵何益哉
