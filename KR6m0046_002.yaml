body:
  text: 明匡山沙門憨山釋德清述不真空論第二此論真空不空以為所觀真諦之境也不真有二義一有為之法緣生故假假而不實其體本空此俗諦不真故空名不真空真性緣起成一切法體非斷滅不是實實的空名不真空有是假有為妙有空非斷空為妙空此則非有非空為中道第一義諦以妙空破心無論本無論二宗以妙有破即色遊玄論一宗即命題一語曲盡真諦之妙妙契中道之旨非玄鑑幽靈何以至此夫至虗無生者指中道第一義諦非思量分別境界蓋是般若玄鑑之妙趣有物之宗極者也般若實智照理故曰玄鑑中道為實智所歸故曰妙趣此則空而不空有物以中道為宗極故有而不有非空非有妙盡中道此標宗立體下依宗辨相自非聖明特達何能契神於有無之間哉上言所觀之境此言能觀之人中道妙理唯聖乃證故曰自非聖明有獨達之智何能契悟於二而不二之間哉是以至人通神心於無窮窮所不能滯極耳目於視聽聲色所不能制者豈不以其即萬物之自虗故物不能纍其神明者也此釋上不滯二邊之所以也神心謂實智內照即玄鑑無窮謂中道即妙趣窮不能滯謂不墮斷空此釋上半句謂不滯空下釋次半句不滯有極耳下謂權智外應耳目聲色乃有物極謂宗極由權智外應而不動本際故處有而不為所制聖能如此者豈不以即萬物之自虗故物不真纍其神明哉由萬物自體本虗故即有以觀空故物物皆真與智冥一故不能纍其神明也是以聖人乘真心而理順則無滯而不通此承上不滯二邊以明妙契中道之所以也理調也聖人乘一真之心而調順萬物則物物皆真無一法可當情故無滯不通審一氣以觀化故所遇而順適審猶處也一氣猶一真化謂萬法以審處一真之心以觀萬法則法法皆真萬物皆己故所遇順適無滯而不通故能混雜致淳混謂混融雜謂異類𬈠謂一真由法法皆真故衆生如也衆生本如故能混融異類則終日度生不見生之可度平等寂滅故一一𬈠真所遇而順適故則觸物而一以所遇皆真故觸事而真故物物歸一如此則萬象雖殊而不能自異此結顯一源良由心境一如故萬法皆如故不能自異不能自異故知象非真象象非真象故則雖象而非象由心境不異則萬法皆空故象非真象諸相寂滅則無法當情故雖象而非象矣然則物我同根物謂境我謂心同根謂心境一如釋上觀智俱泯心境兩忘是非一氣是謂真諦非謂俗諦一氣謂真俗不二妙契中道潛微幽隱如此境智俱忘真俗絶待長為深潛微密幽隱之境界唯聖能證能知殆殊也非群情之所盡如上所云殊非淺智劣解者所能盡也故頃爾談論至於虗宗每有不同夫以不同而適同有何物而可同哉故衆論競作而性莫同焉此下敘異見皆在所破以申作論之懷也虗宗即下所引三宗各立異見故每有不同大凡立論蓋為顯理今以不同之見以適大同之理有何法而可同哉由各騁己見競論虗宗所見不一故論旨不同要歸至理則畢竟難同故得不已造此論以破之何則徵起衆論心無者先敘破晉道恆心無宗無心於萬物萬物未嘗無此敘異計也言心無者謂但無心趨附於萬物未達物虗故萬物未嘗無此得在於神靜失在於物虗此出得失也以心不附物則不被外境搖動故得在於神靜以不了萬物緣生性空故失在於物虗以心空境有非中道也即色者次破晉道林造即色遊玄論為即色宗明色不自色故雖色而非色也此敘計也謂青黃等色不自為色但因人名之為色心若不計則雖色而非色矣夫言色者但當色即色豈待色色而後為色哉此直語色不自色未領色之非色也此敘破也夫凡言色者但當在色本就是色豈待人名彼青黃然後為色哉此直下言得失此但言色不自色而已未了色體本空也以唯知依他起名假不知圓成體真故非正論本無者此破晉竺法汰本無宗情尚於無多觸言以賓無故非有有即無非無無亦無此敘計也此以情好尚於無故觸事發言皆賓伏於無故言非有則計有亦無也及言非無則計無亦無也有無俱無將謂虗玄不知墮於斷見未明正理故非正論尋夫立文之本旨者直以非有非真有非無非真無耳此出正理也詳夫聖人立言之本意但以非有者顯物非實有言非無者顯無非絶無也何必非有無此有非無無彼無此直好無之談豈謂順通事實即物之情哉何必下斥異見也然非有非無但是有非實有無非實無又何必執計非有為絶無此有非無謂絶無彼無哉然雖有無俱無似為玄妙此直好無之談未達正理豈是順通事物之實性以達即物明真之旨哉上敘破計下敘立論正義夫以物物二物字謂以名名物於物此物字所名之物則所物此物字謂所名而可物此物字乃所名之物以物物二物字亦是以名名物非物此物字亦指所名之物言非物如龜毛兔角等故雖物而非物言雖有其名無實物可得是以物不即名而就實名不即物而履真將以名言論真諦惟真諦非名言可及故發論之初先以名物以啓端謂以名名於有相之物則有物可指若以名名於非物然非物乃無相之物如呼龜毛兔角等此則但有虗名其實無物以當其名故曰雖物而非物由是觀之如說火談冰豈有寒熱於齒頰此物不即名以就實也如呼龜毛兔角豈有毛角以應求此名不即物而履真謂不就所呼而得實物也是知名不就實則有相之物皆假名物不履真則無狀之體但虗稱密嚴云世間衆色法但相無有餘唯依相立名是名無實事物尚如此況真諦無相豈名言之可及乎故下云然則真諦獨靜於名教之外豈曰文言之能辨哉然不能杜默聊復厝言以擬之試論之曰真諦寂寥空廓思議之所不及離相離名象數所不能詮迥出常情故曰獨靜於名教之外如此豈語言文字所能辨哉今為破迷執以顯正理故不能杜口緘默聊復厝置其言以擬議之略試論之耳上敘意下正論摩訶衍論云諸法亦非有相亦非無相中論云諸法不有不無者第一真諦也此引教定宗也言諸法非有非無者先立中道諦體也言不有者即俗諦不有也不無者真諦不無也以俗諦假有不真故空真諦緣生故不是實實斷空故題稱不真空含有二義此遮二邊以顯中也故立論之初引此二論以定綱宗發明中道第一義諦不屬有無二邊也下依宗斥邪尋夫不有不無者豈謂滌除萬物杜塞視聽寂寥虗豁然後為真諦者乎此斥邪謬先破本無一宗也以本無宗義謂非有有亦無非無無亦無有無俱絶不達緣生千化之有故墮斷空以此斷空絶無一法故云滌除萬物聞見俱泯故云杜塞視聽古人呼此為豁達空故云寂寥虗豁意謂不有不無者蓋是雙非二邊以顯中道第一義諦豈以豁達斷空為真諦乎古德云寧起有見如須彌山不起無見如芥子許永嘉云豁達空撥因果莽莽蕩蕩招殃禍以此一宗為害甚巨衆聖所呵正在所破故論開端即痛斥之急欲令人發起大乘正信也下顯正義誠以即物順通故物莫之逆此顯正義言非有者在即物以順通其理故物物順理而不逆是為非有即僞即真故性莫之易言諸法緣生虗假故即假即真不必改易然後為真若改易求真是為析色非真空也故為非無性莫之易故雖無而有不是實無物莫之逆故雖有而無不是實有雖有而無所謂非有結以不真故空雖無而有所謂非無結不是實空如此則非無物也言非是絶無正破所執物非真物但物非真物耳正出論義物非真物非真即題稱不真故於何而可物不可物即題稱空義反覆論議非有非無以釋成不真空義以破本無之妄計也蓋即有以明空是謂妙空即空以明有是謂妙有不真一語盡大乘空義真諦之理妙極於斯故經云色之性空非色敗空以明夫聖人之於物也即萬物之自虗豈待宰割以求通哉此下依宗廣辨以明二諦無雙以顯中道第一義諦也文有三段初色空不二次真俗不二三有無不二今初色性自空在色即是空非色敗為空此正顯色空不二也是故聖人即萬法以見性空以萬法本性自空故不待宰割分析然後為空也彼計本無者豈不淪於斷滅耶是以寢疾有不真之談超日有即虗之稱然則三藏殊文統之者一也此引二經以證色空不二之義也淨名云菩薩病者非真非有超日明三昧經云不有受不保命四大虗也非但二經明色性空義即三藏殊文皆顯色空不二之旨故曰統之者一也故放光云第一真諦無成無得世俗諦故便有成有得次明真俗不二也先引經約成得以定二諦以真諦離緣故無成得俗諦緣生故有成得夫有得即是無得之僞號無得即是有得之真名此約真僞以分真俗以真俗諦緣生故假故曰僞號從無住本立一切法故無得是有得真名真名故雖真而非有僞號故雖僞而非無此下約雙非以明不二先出所以良由有依真立故有而非有真自隨緣故無而不無是以言真未嘗有以物即真故未嘗有言僞未嘗無隨緣建立故不無二言未始一二理未始殊言異而旨一故經云真諦俗諦謂有異耶答曰無異也正顯不二此經直辨真諦以明非有俗諦以明非無豈以諦二而二於物哉放光已下通明真俗不二之旨也物指中道理古德云二諦並非雙言單未曾各宗門謂一雙孤鴈搏地高飛一對鴛鴦池邊獨立曹洞賓主五位正偏兼帶照用同時雖發明向上實顯理事混融真俗不二之旨苟悟即真自然得大機用矣然則萬物果有其所以不有有其所以不無此下三辨有無不二也此以二語徵起果實也謂萬物果有其不有果有其不無耶且徵定下四句釋也有其所以不有故雖有而非有有其所以不無故雖無而非無釋不有不無義也謂果有真空則幻有是假故雖有而不有果有妙有則無非斷滅故雖無不無故下成正義雖無而非無無者不絶虗非豁達斷空雖有而非有有者非真有謂是緣生假有故非實有若有不即真謂不實有無不夷跡然則有無稱異其致一也此結成有無總顯不二之義也謂若有不是實有當即有以觀無則無非實無不必芟夷其跡然後為無也若芟夷其跡則為析色若絶無則墮斷滅以真諦之理本非有無故稱異而致一也上顯真俗不二下引經斥迷以攝歸真故童子歎曰說法不有亦不無以因緣故諸法生引經證成攝歸真諦非有非無也楞嚴云真性有為空緣生故如幻無為無起滅不實如空華以從因緣故非有無瓔珞經云轉法輪者亦非有轉亦非無轉是謂轉無所轉此乃衆經之微言也良以說法非有非無故法輪轉無所轉諸大乘經唯明此理而人不達妄執定有定無故下斥破何者謂物無耶則邪見非惑謂物有耶則常見為得將斥迷謬先縱顯俱非也謂法果實無則執斷之邪見非惑矣若法果實有則執常者為得矣以物非無故邪見為惑此正破本無心無二宗以物非有故常見不得此破即色一宗然則非有非無者信真諦之談也斥破迷謬以攝歸真諦也上約三種不二反覆核論非有非無以祛迷執苟契雙非不墮二邊則真諦自顯矣故道行云心亦不有亦不無中觀云物從因緣故不有緣起故不無尋理即其然矣此下至顯於茲矣一段正顯不真空義初引道行立義次引中觀約緣生無性以明不真論云因緣所生法我說即是空亦名為假名亦名中道義以從緣生是假故不有既從緣起則本不有而今有之故云不無由假故不真為空以緣起故不實無故不是真空所以然者此下辨非有無夫有若真實也有有自一向常有豈待緣會聚而後有哉譬彼真無無自常無豈待緣而後無也若有不自有待緣而後有者故知有非真實也有有非真實也有雖有不可謂之有矣上釋非有不無者夫無則湛凝也然不動變也可許也謂之無萬物若無則不應起起則非無以明緣起故不無也此約因緣以明非有非無也謂若有是實有則一向自有不待緣會而後有矣譬彼真無亦不待緣今既待緣生則非實有矣若無則湛然不動可謂之無湛然者以始教相宗不許真如隨緣謂凝然不變故論主出此文以破執無之見意謂真如既已隨緣成一切法則非凝然不變矣以真如有不變隨緣隨緣不變二義下引論證成故摩訶衍論云一切諸法一切因緣故應有一切諸法一切因緣故不應有一切無法一切因緣故應有一切有法一切因緣故不應有下斥異見尋此有無之言豈直反論而已哉此引大論重釋因緣義也謂諸法既屬因緣則本非有無是知無屬因緣則非斷無有屬因緣則非實有尋思此言豈但相反之論而已哉其意特顯諸法非有非無義也良以佛說因緣二字破盡外道斷常之疑故論宗此以斥異見若應有即是有不應言無若應無即是無不應言有此言申相反意謂法應是實有則不當言無若應是實無則不當言有今言非有非無者正以假而非真故言非有非無耳下釋異同言有是為假有以明非無借無以辨非有此事一稱二其文有似不同苟領其所同則無異而不同此釋異同以明不二也今言有無者但是假借有無以明非無非有耳非實有有無作實法也其實一體但稱說似有不同苟能領會一真之理則萬法唯真無異而不同也下顯不真空義然則萬法果有其所以不有不可得而有有其所以不無不可得而無此辨雙非以顯不真空義也謂萬法實不有豈可強執為有耶諸法果不無豈可強執為無耶故不可定執為有為無也何則徵釋雙非欲言其有有非真實也生欲言其無事象既形象形不即無非真非實有然則不真空義顯於茲矣此顯雙非結歸不真空義以呈觀體也若言實有則緣會而生本自無生故非真實生也若言實無則緣起即形隨緣成事則非實無也二者皆非真實故題稱曰不真空義顯於茲良以不真故空故非實有絶無也前約緣性無生以明不真竟下約名實無當以明不真故放光云諸法假號不真譬如幻化人非無幻化人幻化人非真人也此引經證成不真義也彼經二十七云須菩提名字者不真假號為名以假故不真謂但非實有非絶無也故如幻化人非無幻化人但非真人耳夫以名求物物無當名之實以物求名名無得物之功此以假名釋非有非無也以名求物如呼木賊地龍等物豈有真賊真龍以當其名耶以物求名如召火呼冰豈實有寒熱以及齒頰耶足知名實無當物無當名之實非物也名無得物之功非名也是以名不當實實不當名名實無當萬物安在名實無當則名相元虗求物而不可得則妄想不有此心境兩空真俗不立中道之旨於是乎顯矣下斥迷返悟故中觀云物無彼此而人以此為此以彼為彼彼亦以此為彼以彼為此中論第四云諸法實相無有彼此意顯法本一真元無彼此由人妄執故起是非三祖云良由取捨所以不如此彼莫定乎一名而惑者懷必然之志然則彼此初非有惑者初非無此出迷者雙執也如兩人東西對立同觀一標東者謂在西而西者謂在東然標實無東西迷人妄執為必然此惑之甚也故彼此未始有惑者未始無由是觀之諸法本無而迷者妄執為定有定無正此意也既悟彼此之非有有何物彼此而可有執也哉故知萬物非真假號久矣此言悟則是非兩忘自離有無之執也既悟物無彼此則知法非有無但有假名元無實義是以成具立強名之文園林託指馬之況如此則深遠之言於何而不在此引內外微言以結屬忘言之妙也成具云諸法無所有強為其名園林即漆園莊周嘗為此吏故以地指人也指馬之喻齊物論云以指喻指之非指不若以非指喻指之非指以馬喻馬之非馬不若以非馬喻馬之非馬天地一指也萬物一馬也意謂物論之不齊者蓋由人之各執是非之見也以指喻指等者謂人以己之初指喻彼之次指為非同己之指以為必然若易而觀之則彼之執次指者又以己之初指為非矣馬即雙陸之馬戲籌也意亦如指意謂指馬本無是非而人妄執彼此為必然豈非惑耶以譬諸法實相豈有自他而人迷執為有無亦猶是也苟能忘言契理則彼此情忘是非齊泯有何法可當情乎成具則妄想元空園林則是非無主故曰深遠之言於何而不在是以聖人乘千化而不變履萬惑而常通者以其即萬物之自虗不假虗而虗物也故經云甚奇世尊不動真際為諸法立處非離真而立處立處即真也此結歸中道第一義諦也以聖人證窮真諦故異類分身而不動真際故千化不變入衆生界而不被煩惱所礙故萬惑常通以其萬法即真故不假分析而後為虗也故引經證成由不動真際而建立諸法故立處即真然則道遠乎哉觸事而真聖遠乎哉體之即神此結歸一心以明聖人之實證也初云目對真而不覺以道在目前故不遠以不覺則迷之為凡悟則為聖是知了悟實相常住則頓超生死永證無為故曰體之即神不假外也不真空論終
