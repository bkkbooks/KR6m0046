body:
  text: 肇論序慧達率愚序長安釋僧肇法師所作宗本不遷等四論曰有美若人超語兼默標本則句句深達佛心明末則言言備通眾教達猥生天幸逢此正音每至披尋不勝手舞誓願生生盡命弘述夫神道不形心敏難繪聊寄一序請俟來哲蓋大分深義厥號本無故建言宗旨標乎實相開空法道莫逾真俗所以次釋二諦顯佛教門但圓正之因無尚般若至極之果唯有涅槃故末啟重玄明眾聖之所宅雖以性空擬本無本可稱語本絕言非心行處然則不遷當俗俗則不生不真為真真但名說若能崇茲一道無言二諦斯則靜照之功著故般若無知無名之德興而涅槃不稱余謂此說周圓罄佛淵海浩博無涯窮法體相洪論第一肇公其人矣
