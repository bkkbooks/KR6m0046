body:
  text: 明匡山沙門憨山釋德清述涅槃無名論第四涅槃無名論者以所論者涅槃故以為題言涅槃者梵語也此云圓寂謂五住究盡為圓二死永亡為寂乃寂滅一心之異稱清淨法身之真體非死之謂也以三世諸佛曠劫修因證此一心之體名為法身以酬廣大之因名為報身隨機益物名為化身一切諸佛皆具三身法身為體化身為用有感即現無感即隱隱而不現圓歸一心攝用歸體名為入滅是稱涅槃非生死之謂也以此一心五住煩惱不能覆故曰圓二種生死不能羈故云寂故教約出處說有四種一自性涅槃謂即此一心名為法身偏一切處為諸法體名為自性本來寂滅所謂有佛無佛性相常住一切衆生本來滅度不復更滅故云自性涅槃二有餘涅槃謂三乘所證無明未盡變易未亡證理未圓三皆有餘故亦稱涅槃三無餘涅槃即修成之佛妄盡真窮體用不二亦名所證無上大涅槃果故名無餘四無住涅槃謂一切聖人不處有為不住無為二邊不住中道不安動靜為二總名涅槃故云無住此四種名但約體用之稱其實一心名相俱寂故云無名所謂生死及涅槃二俱不可得故云無名是為不生不滅常住一心之都稱耳前不遷不真為所觀之境般若為能觀之智三皆是因以此涅槃乃所證之果故以為論奏秦王表什師入滅論主追慕無已因作涅槃無名論以稱述所證之德不異於佛以讚揚之言雖以前般若乃能證之智為因涅槃為所證之果其意實為什師而發論成表獻秦主故首列其表文僧肇言對人主而不稱臣者以方外自處也所謂不事王候高尚其事天子雖尊不以臣禮待之也肇聞天得一以清地得一以寧君王得一以治天下天得一等語用老子一謂大道之元也老宗自然名為大道論宗一心同文義異伏惟陛下睿聖也哲智也欽敬也明謂明德道與神會道謂涅槃大道秦王妙契故曰神會妙契環中莊子樞得其環中以應無窮謂秦王妙悟中道故理無不統以悟一心則理無不攝游刃語出莊子庖丁解牛迎刃而解以喻妙智應物則事無不理萬機人君日有萬機弘道終日謂不以萬機以妨弘道威被蒼生垂文作則法也所以域中有四大而王居一焉此美秦王能妙悟一心而具堯舜之德也尚書睿哲舜德欽明堯德謂秦王不唯具堯舜之德且能契涅槃中道妙理統會一心故雖日應萬機不妨弘道終日用武興文為世明主所以域中四大而王居一焉語出老子天大地大王亦大此歎德也涅槃之道蓋是三乘之所歸三乘同證故曰所歸方等之淵府方等深經之究竟理趣故曰淵府渺漭汪洋無涯希夷離聲離色故絶視聽之域回超見聞幽致虗玄幽妙之理致虗靈絶待殆甚也殊也非羣情淺識之所測此歎涅槃之道為衆聖歸趣體絶名相非見聞可及絶待幽玄故非淺識之可測也肇以人微猥蒙國恩得間居學肆幸列譯場在什公門下十有餘載公十九見什三十二歲而亡雖衆經殊致勝趣非一然涅槃一義常以聽習為先但肇才識暗短雖屢蒙誨喻猶懷疑漠漠無知貌為竭愚不已亦如似有解未為必得其趣然未經高勝先唱不敢自決此論主自敘得法之由也謂雖刻意涅槃一義似有所悟然未經高明勝智之人印證故不敢自決不幸什公去世咨參無所以為永慨此言什公業已入滅咨決無由再不復見斯人故為永慨此所以有感故作此論而陛下聖德不孤獨與什公神契目擊道存快盡其中方寸故能振彼玄風以啓末俗此言秦主天挺聖智獨與什公心相印契妙悟不言之表能力振什風以開導末俗意謂什公雖亡幸有秦王可以印心也一日遇蒙答安城候姚嵩書問無為宗極姚嵩亦秦之宗屬以秦王先有詔云夫道以無為宗姚嵩難云不審明道之無為為當以何為體蓋以涅槃乃無為之道秦主答有多說以論所引正言涅槃故下引其答義以發論端何者夫衆生所以久流轉生死者皆由著欲故也若欲止於心即無復於生死既無生死潛神玄默亦作漠與虗空合其德是名涅槃矣既曰涅槃復何容有名於其間哉此引秦王答姚嵩問無為宗極之辭而指涅槃乃無為宗極而結以無名歸之此論主所以為茲論之發啓也意謂生死乃有為之法而以著欲為因故感三界之苦果若欲止於心即生死永斷既無生死則勞慮永息潛神寂漠之鄉絶然無為與虗空合其德是名涅槃然涅槃之道如此而已豈容有名於其間哉故以無名稱之斯乃窮微言指聖經之美極象外之談者也此讚秦王無名之說妙契佛心自非道參文殊謂契文殊之智德侔慈氏同慈氏之悲孰能宣揚玄道為法城塹言若非契二聖之智悲何以弘揚妙道外護三寶使夫大教卷而復舒幽旨淪而更顯意謂涅槃大教得什公闡明今什公已亡則妙旨已淪今幸有秦王發明故曰卷而復舒淪而更顯尋玩殷勤不能暫捨欣悟交懷手舞弗暇豈直當時之勝軌方乃纍劫之津梁矣論主述其慶法之歡謂其言不但為一時雅範且為長劫津梁然聖旨淵深也玄妙也理微幽微言約簡也可以匠法也彼先進宿學之人拯援引也拔提也高士高尚之士懼言題之流執言語名字之流或未盡上尊人主為上意庶近也擬擬議孔易十翼之作伏羲畫卦文王爻辭周公繫辭孔子作十翼以贊之即上彖下彖等豈貪豐文非貪豐富其文以誇其美圖以弘顯幽旨圖以弘揚顯發涅槃之幽旨輒作涅槃無名論論有九折十演以法十翼博廣也采取也衆經託取託證印證成喻以仰述陛下無名之致豈曰關詣神心非散關涉聖神之心窮究遠當亦不敢言窮究高遠必當之理聊以擬倣效也議軌則玄門涅槃玄門班喻學徒耳布曉後學耳論末章云秦王答姚嵩書末章諸家通第一義諦皆云廓然空寂無有聖人比時諸家計勝義空寂不容有聖吾常以為太甚徑庭莊子語意謂太甚邈遠不近人情若無聖人知無者誰吾常下秦王答姚嵩之辭謂無聖之說與理乖差其言邈遠不近人情若無聖人知無者誰意必有聖為證理之人實如明詔實如明詔此論主印可秦王有理之談當理故再稱之夫道恍惚窈冥其中有精二語用老子恍兮忽其中有物窈兮冥其中有精意指精者即為聖人似未穩當若無聖人誰與道遊意謂能證聖諦第一義是為聖人非聖義諦中有聖人也下云出處異號故云與道遊頃諸學徒莫不躊躇不進之貌道門怏怏不決之意此旨懷疑終日莫之能正謂一時學人聞無聖之說皆猶豫不進於入道之門不決此理故懷疑終日無與正者幸遭逢也高判宗徒𢄶裂帛聲然謂幸逢秦王有聖之論乃高遠判決故宗徒之疑𢄶然盡裂扣關入道之人之儔蔚盛貌登玄室言一時學人聞秦主之論其疑盡決扣關入道之人蔚然登堂入室真可謂法輪再轉於閻浮道光重映於千載者矣謂當時之疑無能決之即有談者未必見信幸遇王言其出如綸故無不宗仰一言之重可謂法輪再轉道光重映矣今演論之作旨曲辨涅槃無名之體寂止息也彼廓然排方外之談方外謂遊方之外謂學佛者當時流輩有宗廓然無聖者遂起斷見謂絶無聖人因排斥聖為權現非真撥無因果恥修行者以為著相是以喧然以為得莫能正者今幸秦主答嵩書云若無聖人誰與道游即此一言使偏見之流邪說頓息使嘵嘵者寂然無聲故重演之以助明教條牒如左謹以仰呈若少參合也聖旨願敕存記如其有差伏承指授僧肇言論呈秦王覽之答旨殷勤備加讚述敕令繕寫班諸子姪其為人主推重如此泥曰泥洹涅槃此三名前後異出蓋是楚夏不同耳云涅槃音正也五竺梵音不同如此方之楚夏蓋以涅槃為正音也九折十演者折謂折辨有名立難演為敷演無名通理謂其難有九而演有十也意蓋以涅槃有名而難以無名而答以顯無名之理開宗第一開示涅槃無名之正義為下答難之綱宗亦猶四論之宗本也一論大旨不出此章將顯無名之致先標有名以彰宗依也教說涅槃有四今但稱二名以自性約理無住約行二者有名無實故不必論今二涅槃約人以名無餘乃如來所證有餘乃三乘所證今論指佛應緣未盡有名有實將為宗依故但稱二也今詳論主立意前尊秦王若無聖人誰與道游之詔以破邪宗廓然無聖之流以為發論之端今標二種涅槃以為論宗蓋謂能證之人有實所證之理無名故依之以立論也無名曰假設通答之人如子虗無是公也經稱有餘涅槃無餘涅槃者秦言無為亦名滅度梵語一名翻有二義無為者取乎虗無寂寞離名絶相妙絶於有為滅度者言其大患永滅老子云吾所以有大患者為吾有身今指分段變易二種生死二死永亡故云大患永滅超度四流四流謂欲流有流見流無明流為二死之本斯蓋是鏡像之所歸鏡像楞伽經云譬如明鏡現衆色象現識處現亦復如是謂一切衆生身心世界皆唯識所現乃八識相分攝相歸性元是真如故云鏡像之所歸絶稱之幽宅也以離名故絶稱離相故言幽宅而曰有餘無餘者既離名相又有有餘無餘二名者良是出處之異號應物之假名耳言涅槃者蓋一真法界法身之真體也證此法身是稱為佛機感必應即現身說法故為出緣畢而隱攝相歸體故為處故一切諸佛以現身為有生以緣滅為涅槃殊不知滅元不滅如云餘國作佛更有異名所謂應物之假名也余嘗試言之下正廣論無名之旨夫涅槃之為道也寂寥虗曠其體寂滅不可以形名得離名字相微妙無相不可以有心知離心緣相超羣有以幽升高超三界惑無不斷量太虗而永久永證無為真無不極隨之弗得其蹤未來無終迎之罔眺其首過去無始六趣不能攝其生五住究盡力負無以化其體二死永亡潢漭水無涯貌謂汪洋無涯惚恍言非有非無不可以定名若存生而不生若往滅而不滅五目謂肉眼天眼法眼慧眼佛眼不覩其容無狀無相以離色故視之而不見二聽謂肉耳天耳不聞其響以離聲故不可聞冥冥窅窅誰見誰曉冥冥不可見窅深貌窅窅不可窺彌綸充滿包羅之義靡無也所不在而獨曳超脫也於有無之表然則言之者失其真言生理喪知之者反其愚非智可知有之者乖其性若執是有則違寂滅之體無之者傷其軀法身流轉五道名曰衆生若執是無則墮斷滅所以釋迦掩室於摩竭佛初成道三七思惟而不說法淨名杜口於毗耶文殊問維摩不二法門維摩默然須菩提唱無說以顯道釋梵絶聽而雨華須菩提巖中晏坐帝釋散華供養謂其善說般若尊者以無說而說天帝以無聞而聞斯皆理為神御不言之道唯證乃知故口以之而默豈曰無辨辨所不能言也四辨不能談其狀經云真解脫者離於言數象也寂滅永安生滅已滅無始無終非生非滅故無始終不晦不明寂光常照不屬晦明不寒不暑非遷流之法不屬時分故不寒不暑湛若虗空法身清淨湛然常寂猶若虗空無名無說離相故無名離言故無說此義引涅槃淨名等經論曰中論涅槃非有亦復非無言語道斷心行處滅口不能言故言語道斷心不能思故心行處滅尋夫經論之作上引斯論立言本意豈虗搆哉言非虛稱架空之談果實也有其所以不有故不可得而有本亦非有有其所以不無故不可得而無耳亦復非無何者徵釋非有非無之所以本言尋究也之有境則五陰永滅不屬生死故五陰永滅不可得而有滅則離苦乃樂德也推言推測也之無鄉而幽靈不竭雖絶見聞而幽深窅眇靈知獨照至真常存此真我德也幽靈不竭則抱一湛然一真之地湛然常寂此真常德也五陰永滅則萬纍都捐永離生死則衆惑俱消此真淨德也萬纍都捐故與道通洞由其惑淨故內冥至理抱一湛然故神而無功由其體常寂而妙用無方故神而無功神而無功故至功常存無心而應故功垂不朽與道通洞故沖而不改由惑盡真窮故沖深而不變沖而不改故不可為有由體虗不變故不可為有至功常存故不可為無以隨緣應現利樂無窮故不可為無然則下總結離名離相有無絶於內以其體至真寂用一源故內絶有無稱謂淪泯絶也於外不可以名字加之故稱謂泯絶視聽之所不暨及也非色非聲故視聽不及四空之所昏昧四空天人迷而不知故所昏昧恬焉而夷平等一如怕焉而泰寂而常照無幽不鑒九流於是乎交歸九流非世之九流乃指九界衆生以涅槃乃一切衆生之本源故曰交歸衆聖於是乎冥會十方諸佛究竟之鄉故云冥會斯乃希夷之境非見聞之境太玄之鄉玄之又玄故云太玄而欲以有出有無入無題榜標指也其方域謂以涅槃為諸聖出生入死之名特以有無之名題榜標指其方所而語其神道者以此為得者不亦邈遠也哉核體第二此有名興難乃折之一也因前云涅槃之體非有非無故今折之體竟何在故云核體謂即有餘無餘之名以責有實體非無名也有名曰名家按名以責實故興折難夫名號不虗生謂有名必有實豈有無實而彰名者稱謂不自起凡名不自名必因人見有可稱乃稱其名經稱有餘涅槃無餘涅槃者蓋是返本之真名非是虗稱神道之妙稱神道之妙無可稱之故以涅槃名之是為妙稱者也請試陳之謂按涅槃有餘無餘之稱是則涅槃有名也何言無名先論有餘興難有餘者謂如來大覺始興法身初建此因有餘以定名先舉果德以彰因行有餘也他處有餘皆依三乘之人證理未圓斷惑未盡而說今此論中單約佛果利生有餘緣未盡而說詳論文義蓋是權教三十四心斷結成佛之果號乃小乘所見之佛非法報冥一之極果蓋依小乘見有出生入死以立難也今言如來乃十號之一謂乘如實道而來三界大覺乃就德立稱謂如來自覺覺他覺行圓滿三覺已圓故稱大覺然此大覺乃報身之稱今論通稱權教之佛亦是大覺約總德也法身非清淨法身乃權教之佛五分所成之法身謂戒定慧解脫解脫知見此五法熏成之身也姓興初建蓋指應身初現六年苦行於鹿野苑初成正覺非菩提場為初成也澡八解之清流憩七覺之茂林此下正舉佛果已成返彰因行也八解者一內有相外現色二內無色相外現色三淨解脫四空處定五識處定六無所有處定七非非想處定八滅受想定此八有斷惑之能故如清流有浣濯之用憩者休息也七覺支謂擇法進念定喜捨倚此七覺法如來修習已圓安逸其中故如休息於茂林之下也此上言果滿下顯因圓積萬善於矌劫蕩無始之遺塵此讚佛因行曠大劫來廣修萬善蕩洗滌也無始無明煩惱洗滌無遺三明鏡於內神光照於外內證三明謂過去宿命明未來天眼明現在漏盡明由具三明故了知三世鑒機說法曲盡隨宜結僧那於始心終大悲以赴難梵語僧那此云弘誓謂菩薩最初發心先發四弘誓願故云始心及至成佛專以利生為事故云赴難謂救八難也仰攀玄根俯提弱喪因中上求佛果以實智證理故云仰攀玄根權智化物故曰俯提弱喪言衆生沈迷猶自幼亡家故云弱喪超邁三域獨蹈大方三域謂三界謂佛能遠超三界高證無為大方喻所證之理小乘獨許悉達成佛故云獨蹈啓八正之平路坦衆庶之夷途八正即八正道謂正見正思惟等由佛開啓衆庶庶孽也即指諸異見外道夷途應作邪途唯佛能坦之騁六通之神驥乘五衍之安車言佛以六通御物如騁神駿五衍梵語衍那此云乘謂界內人天出世三乘共有五乘應機說法運載衆生至無畏處故云安車至能出生入死與物推移言如來應機利物有感即現緣盡即滅故云出生入死隨順機宜故云推移楚辭聖人與世推移而不凝滯於物道無不洽德無不施一雨普潤無不充洽三檀等施物無不利窮化母之始物極玄樞之妙用化母謂造化生物以喻因緣生法謂一切諸法從因緣生故云始物玄樞實智妙用權智即實之權故云極廓虗宇於無疆耀薩雲於幽燭昭廓心境徹法界之量故云無疆梵語薩雲若此云一切智謂以一切智照盡微塵剎土盡見衆生心數故云幽燭將絶朕於九止永淪太虗上言應緣益物此言緣盡入滅朕謂朕兆物始萌之微也九止即九地謂地乃佛之行履今化緣已畢將絶跡於化境永淪太虗指無餘涅槃而有餘緣不盡餘迹不泯度生之緣未盡教道之跡未圓故云不泯業報猶魂聖智尚存此有餘涅槃也按此二語論中立難有餘涅槃正指三藏果頭佛也所謂同除四住此處為齊若伏無明三藏則劣以無明未盡異熟未空故云業報猶魂尚須智斷故云聖智尚存以二皆有餘立難以此經曰陶冶塵滓如鍊真金萬纍都盡而靈覺獨存此結證有餘涅槃也約塵滓之言陶應是淘謂洗也冶鎔冶銷融也塵滓喻煩惱如銷真金先去礦垢無餘者謂至人教緣都訖靈照永滅廓爾無朕故曰無餘此下言無餘涅槃也謂聖人由機教相扣故現身三界機教俱盡故潛耀斂輝靈照永滅永滅應跡俱絶故廓爾無朕如薪盡火滅故云無餘何則夫大患莫若於有身故滅身以歸無勞勤莫先於有智故絶智以淪虗何則下徵釋無餘之所以也蓋以身智為纍故俱滅為無是為無餘此正小乘所見也大患莫若於有身老子云吾所以有大患者為吾有身若吾無身吾有何患以厭患其身故滅身以歸無又云絶聖棄智謂因智以勞形故絶智淪虗故心逸而無纍然則智以因也形倦形以智勞輪轉修途疲而弗已智則分別執取形則根塵和合起惑造業故輪轉生死長劫不返者身心之過也經曰智為雜毒形為桎梏淵默以之而遼患難以之而起此引證智形為纍之所以也智即起信六粗之智相乃分別執取為無明三毒煩惱之本故為雜毒桎梏刑器乃形纍之譬桎拘足梏縛手形骸拘攣亦猶是也謂分別情生故與淵默之理相遠生死苦患因之而起此智之過也故聖人釋智遺形所以免纍所以至人灰身滅智捐形絶慮內無機照之勤外息大患之本聖人因知形智之纍故灰身歸無以損其形滅智淪虗故忘緣絶慮由絶慮故內無機照之勤勤勞也由損形故外息大患之本身心兩忘所以大患永息生死頓超超然與羣有永分渾爾與太虗同體形智俱亡則生死永絶高超三界故與羣有永分心與理冥返一絶跡故渾與太虗同體寂焉無聞怕爾無兆冥冥長往莫知所之其猶燈盡火滅膏明俱竭此無餘涅槃也經云五陰永盡譬如燈滅此結屬無餘涅槃之相也謂涅槃之體無聲故寂焉無聞無色故怕爾無兆泯絶見聞故冥冥長往莫知所之之猶往也形智俱泯故如燈盡火滅膏明俱竭以竭盡無餘故云無餘涅槃下引經證此乃小乘偏空涅槃也蓋論意折辭皆約小乘起見故難其答以大乘正義故以破偏執也然則有餘可以有稱無餘可以無名無名立則宗崇也虗者欣尚於沖默有稱生則懷德者彌仰於聖功斯乃誥典之所垂文先聖之所軌轍此舉益將以結難意也如上有餘無餘之說則若有若無皆可指陳若無名立則使小乘崇虗者欣然趣尚於沖默虗無之理若有名可稱則合大乘懷聖德者益觀其功此讚述有無皆不失理此乃聖經誥典之垂文先聖隱顯化物之軌轍故下責之曰而曰有無絶於內稱謂淪於外視聽之所不暨四空之所昏昧使夫懷德者自絶宗虗者靡託無異杜耳目於胎殼掩玄象於雲霄外而責宮商之異辨玄素之殊者也此指本論責其乖理也難者意謂若有名可稱使懷德者有所歸無名既立則令崇虗者有所託今如所論有無雙絶稱謂俱喪如此則懷德絶分崇虗者無憑雖云玄妙但非見間之何異杜塞耳目於胎殼為生盲生聾之人玄象指日月且又掩日月之光如長夜而責之以辨宮商之音別玄素之色者不亦遠乎子徒知遠推至人於有無之表高韻絶唱於形名之外而論旨竟莫知所歸幽途故自蘊而未顯靜思幽尋寄懷無所豈所謂朗大明於冥室奏玄響於無聞者哉此結責違理以明無益也謂子言涅槃之道超出有無稱謂之外徒知高推聖境逈絶形名而論之旨趣畢竟莫知所歸宿涅槃幽眇之途自是蘊覆而未顯發名家謂我靜而思之幽而尋討之茫然奇懷無所依託非所謂朗涅槃大明之道於重冥之室使其共見奏玄響於絶聽之地令其共聞者哉謂是欲明而返暗欲通而返塞也位體第三位猶安也亦立也因有名核體寄懷無所故無名答以位之發明聖人非出生入死而稱有餘無餘蓋法身隨緣隱顯以答之無名曰據難以答有餘無餘者蓋是涅槃之外稱應物之假名耳由前難云涅槃乃神道之妙稱返本之真名故今答意直以應物之假名以破之即此一言盡祛其迷而存稱謂者封名志器象者耽形名也極於題目形也盡於方圓方圓有所不寫題目有所不傳焉可以名於無名而形於無形者哉此破難者妄執之情也稱謂名也形乃相也然名相乃依他緣起為遍計所執若封名志相蓋遍計之執未忘故名不能超題目之虗稱形不能出方圓之假象若了依他性假則遍計體空而圓成實性離名離相則形有所不能顯名有所不能傳是為超情離見非常情之境無形無名之道安可以形名求之哉涅槃無名之義於是乎顯矣難序云有餘無餘者信是權寂致立也教之本意亦是如來隱顯之誠跡也上縱下奪但未是玄寂絶言之幽致又非至人環中之妙術道也耳言但是聖人應化隱顯之跡非返一絶跡之道也子獨不聞正觀之說歟維摩詰言我觀如來無始無終六入已過三界已出不在方不離方非有為非無為不可以識識不可以智知無言無說心行處滅以此觀者乃名正觀以他觀者非見佛也此正示如來法身真如實際超三世離根量出三界遍一切處而無方所不屬有無分別非思議之境豈可以有餘無餘假名稱謂可盡其量哉放光云佛如虗空無去無來應緣而現無有方所引證上義以顯自性涅槃也經云佛真法身猶若虗空應物現形如水中月故云應緣而現無有方所然則聖人之在天下也寂莫虗無無執無競導而弗先感而後應此承上經義以明無住涅槃也以法身遍在一切處一切衆生及國土故云之在天下三世悉在無有餘亦無形相而可得故云寂寞虗無競諍也有諍說生死無諍說涅槃生死及涅槃二俱不可得故云無執無競此言真身也導而弗先等言應身隨緣也寂然不動故導不能先感而遂通天下之故故云感而後應譬猶幽谷之響明鏡之像對之弗知其所以來隨之罔識其所以往恍焉而有惚焉而亡此釋鏡像喻動而逾寂隱而彌彰出幽入冥變化無常此正喻顯無住義也谷鏡喻法身虗明湛寂之體臨照呼聲喻感應之機像喻現身響喻說法不知所以來不住有餘也不識所以往不住無餘也其猶月映于江隨方各應而本體湛然故云動而逾寂風吹萬竅羣響並作而谷體愈虗故云隱而彌彰此所以出有入無幽冥莫測變化無常以此名為無住涅槃也其為稱也有餘無餘之名因應而作顯迹為生息迹為滅生名有餘滅名無餘此釋有無之稱乃應物之假名耳故云因應而作但顯化為生生名有餘緣息為滅滅名無餘然則有無之稱本乎無名無名之道於何不名有無乃應物之跡無名為本是則名出於無名從本垂迹何所不名哉但不可執跡以昧其本耳是以至人居方而方止圓而圓在天而天處人而人原夫能天能人者豈天人之所能哉果以非天非人故能天能人耳言聖人安住無名法身之體而應用無方無剎不現豈天人所能哉由其超出人天故能天能人耳其為治化也也故應而不為因而不施作也因而不施故施莫之廣應而不為故為莫之大此言即實之權故其用廣大也治為教化衆生以待感而應故不強為因機說法待扣而說故但因之而無施作以作則有心也以無心而施故大地齊扣一時普應故莫之大以不為而應故十方遍感一身普應故莫之廣此所為其用廣大也為莫之大故乃返於小成施莫之廣故乃歸乎無名此言即權之實以顯體微也小成語出莊子道隱於小成彼言大道在人而所成者自小耳此言小成謂返一絶跡也謂以無為而為故大而絶跡無心而作故廣而無名由即權以顯實故不可以有無之名求之耳經曰菩提之道不可圖度高而無上廣不可極淵而無下深不可測大包天地細入無間故謂之道然則涅槃之道不可以有無得之明矣此引證用廣體微之義也經乃太子本起瑞應經謂菩提之道其體微妙非言思境故不可圖度其用廣大故極上極下而不可測然雖包天地而細人無間故極廣大而盡精微以此而推則涅槃之道不可以有無之跡而得之者明矣而惑者覩神變因謂之有見滅度便謂之無有無之境妄想之域豈足以標榜玄道而語聖心者乎此解惑責迷也由上言極槃之道體用微妙不可以有無得之故此責其惑者不達覩其神變即謂之有見滅度即謂之無故說有餘可以有稱無餘可以無名殊不知有無之境乃妄想之域豈足標示涅槃之妙道而語聖心者乎其實法身體中有無雙絶意謂至人寂怕無兆隱顯同源存不為有亡不為無此示法身極證將解惑者之迷也謂法身寂滅無為不墮諸數故寂怕無兆隱顯同源真應不二故雖生而不生故存不為有雖滅而不滅故亡不為無何則徵釋上二義佛言吾無生不生雖生不生無形不形雖形不形以知存不為有此引證存不為有也佛言者乃義引般若涅槃經語言無生不生者謂無一衆生之類而不示生也無形不形者謂無一類之形而不受也不唯人天六道乃至異類鬼神總之四生一十二類無處不入也此乃法身普應其體湛然不動故雖生而不生雖形而不形所以存不為有也經云菩薩入無盡三昧盡見過去滅度諸佛又云入於涅槃而不般涅槃以知亡不為無此引證亡不為無也經乃普華嚴經即安住長者成就法門名不滅度所得三昧名無盡佛性唐釋名佛種無盡三昧此云正思亦云正受無盡者以佛性無盡故入此三昧見三世佛亦無盡以此圓宗三世互現故義引盡見過去滅度諸佛楞伽云無有佛涅槃亦無涅槃佛故云入於涅槃而不般涅槃以此故知亡不為無亡不為無雖無而有存不為有雖有而無雖有而無故所謂非有雖無而有故所謂非無然則涅槃之道果出有無之域絶言象之徑斷矣此躡前以明雙非以顯無住由是而知涅槃之道實超有無之境絶言象之路斷然明矣又何以生死去來有無稱謂而擬議哉上通答有無以破其惑下別破勞患以祛生滅之見子乃云聖人患於有身故滅身以歸無勞勤莫先於有智故絶智以淪虗無乃乖乎神極傷於玄旨者也此敘計責迷也由上發揮涅槃超情離見逈出言象有無之外而名家妄以厭患生死而以滅身絶智為無餘故責之曰若子之所云聖人云云者豈不乖違於法身神極之理傷於涅槃之玄妙旨趣者乎下引經極成經曰法身無象應物而形般若無知對緣而照此引經證聖人身心本無勞患何有也晉華嚴三十二略云清淨法身非有非無隨衆生所應悉能示現此證無身而現身無身可厭也般若無知下義引般若無心而照證無智可勞也下明不但身心兩忘抑且身心雙寂萬機頓赴而不撓其神千難殊對而不干其慮動若行雲止猶谷神豈有心於彼此情係於動靜者乎此明無心應物以釋無智可勞也萬機頓赴如月照萬川有何撓其神千難殊對如一雨普潤又何于其慮華嚴云假使無量阿僧祇衆生一一各具阿僧祇口一一口具阿僧祇舌一一舌出阿僧祇問難而菩薩以一言演說盡答無餘今言千難猶小小耳以無心而動故若行雲虗而常寂故止若谷神谷神語出老子謂虗而能應也聖人如此豈有心於彼此精係於動靜者乎此無心而應有何智可勞乎既無心於動靜亦無象於去來去來不以象故無器而不形動靜不以心故無感而不應此明非形現形故無身可患也言既無心勤靜則無身生滅有何去來由其身心兩亡故能隨緣普應故無器不形無感不應如此又何有身可厭患乎然則心生於有心象出於有象此言聖人無心生心無相現相也謂聖人本自無心以衆生心為心聖本無相因衆生願見故應之以相是以身心如幻患纍何生下釋無患象非我出故金石流而不燋心非我生故日用而不動紜紜自彼於我何為言聖人無我故無患雖流金爍石而不燋無心故日應衆緣而不動以紜紜自彼於我何為又何患乎所以智周萬物而不勞形充八極而無患益不可盈損不可虧寧復痾癘中逵壽極雙樹靈竭天棺體盡焚燎者哉此示無患之所以將斥小乘之見也以無心而應故智周而不勞以無身而現故形云而無患經云法身遍在一切處一切衆生及國土故益不可盈三世悉在無有餘亦無形相而可得故損不可虧聖人之身心如此下斥小見豈有痾癘中達此痛背之事阿含經說如來向拘尸羅城中路背痛令弟子四疊僧伽黎樹下休息等如來雙樹入滅故云壽極天棺乃佛之葬儀焚燎乃火化等此乃小乘見應化佛有生死去來之跡而不知法身常住豈可以此為無餘涅槃哉而惑者居見聞之境尋殊應之迹秉執規矩而擬大方欲以智勞至人形患大聖謂捨有入無因以名之豈謂採微言於聽表拔玄根於虗壤者哉此結責迷情也如上所談至人身心如此之妙而惑者不知以生滅見聞之境求隨應之跡而擬議法身其猶執規矩方圓而擬度太虗將欲以智與形可以勞患聖人即以生死捨有入無名為涅槃如此之小見豈是超視聽之表得法身之理哉玄根意指法身虗壤意指寂光此非尋常見聞可及也徵出第四徵責也以前云涅槃之道果出有無之境徵意云有無二法攝盡一切如何有無之外別有涅槃之體今詳徵辭包舉儒老有無之說復引小乘有無為例以詰難之有名曰夫渾元剖判萬有參分有既有矣不得不無無自不無必因於有所以高下相傾有無相生此乃自然之數謂理數數極於是此言有無相生以為定有定無也渾元乃混沌一氣未分之前名太極無極謂本無也及陰陽初判兩儀既分而人居中是為三才謂一生二二生三三生萬物故曰萬有參分是謂有也有既有矣變化遷訛四時代謝不得不無且無不自無必因有以成無只如寒中無暑暑中無寒日中無暗暗中無日晝夜相代所以高下相傾譬如四時成功者退有無相生此乃自然必定之理天地之理數極盡於是而已矣以此而觀化母所育理無幽顯大也恑奇也譎詐也怪夭也無非有也有化而無無非無也然則有無之境理無不統謂歷觀化母所育化母指一氣生成萬物故云所育凡在陰陽所生之物無論恑譎怪皆是有也有形之物必歸變滅故云有化為無此則實實是無故云無非無也以此而知有無之境理無不統此則世間之法不出有無經曰有無二法攝一切法又稱三無為者虗空數緣盡非數緣盡數緣盡者即涅槃也此引出世三乘之法亦以有無統之也三無為者乃唯識六種無為之三也按百法解虗空無為乃喻真如之理猶如虗空其體常住擇滅無為乃二乘涅槃析色所證謂因慧數揀擇而證滅故非擇滅者謂圓成之理本來寂滅不復更滅故非擇滅即非數緣滅新疏以非數緣滅謂諸法緣離自滅同前儒老自有入無似非論義難家通以無為為涅槃今聞有無之外別有妙道所以立難而論云有無之表別有妙道妙於有無謂之涅槃請核妙道之本體也果若有也雖妙非無雖妙非無即入有境果若無也無即無差無而無差即入無境總而括之即而究之無有異有而非無無有異無而非有者明矣此申難意謂三教之理世出世間有無之法該括殊盡而今論云有無之外別有妙道名為涅槃是所難信也請核下正出難意謂妙道之體果實是有雖妙亦定有定有即入有境若妙道果實是無則必定無即入無境以此總萬法而括之以理即教以究其元不出有無之外豈有異有而又言不無異無而又言不有者耶而曰有無之外別有妙道非有非無謂之涅槃吾聞其語未即於心也此難家責違也謂非有非無之說其論雖妙吾聞其語而已未愜於心實所未悟也超境第五境即上難家有無之境謂根塵為有小乘灰滅取為涅槃是稱為無今演大涅槃超卓有無以破其執無名曰有無之數名也誠以法無不該理無不統縱也然其所統俗諦而已大品云菩薩以世諦故示衆生若有若無非第一義故云俗諦唯識百法該世出世然皆有我故稱為俗經曰真諦何耶涅槃道是俗諦何耶有無法是此引證世出世法通名俗諦何則徵明有無皆俗諦義有者有於無無者無於有有無所以稱有無有所以稱無此則有無相形也本無生死而今有之本無身心而今有之此有者有於無耳二乘之人灰滅身心超脫生死而證無為是以無者無其有耳是以有其所無故稱有無其所有故稱無此相待相形故為俗也然則有生於無無生於有離有無無離無無有有無相生其猶高下相傾有高必有下有下必有高矣然則有無雖殊俱未免於有也釋成有無相生如高下相傾是則有無之名雖殊俱未免於有故所以為俗耳此乃言象之所以形是非之所以生豈是以統夫幽極擬夫神道者乎此結責有無既形於言象必生其是非未為一定之理豈足以統攝幽妙之極致而擬議涅槃之神道乎是以論稱出有無者良以有無之數名也止乎六境之內六境之內非涅槃之宅故借出以祛遣之此正明出意也謂涅槃之道超出有無者良以有無之名止乎六境根塵之內以根塵生滅之法非涅槃不生不滅之致故假借一出字以遣執迷之情耳始非出此之外別有一有可居也庶悕道之流髣佛比擬也幽途託情絶域得意忘言體其非有非無豈曰有無之外別有一有而可稱哉此勉玄悟忘情也所以言超出者冀望學道之流因言比量涅槃之妙寄心於忘情絶證之域得意忘言悟其非有非無耳豈是有無之外別有一有可稱謂哉執言昧旨失之甚矣經曰三無為者蓋是羣生紛繞生乎篤患篤患之尤莫先於有絶有之稱莫先於無故借無以明其非有明其非有非謂無也此斥迷也經言三無為者蓋因衆生生死往來紛紛繞繞而不停者生乎根塵為篤患之本也而篤患之甚者莫先貪著執有之情也若欲絶其貪著之心莫先於涅槃之無以為安逸之宅因此故借一無字以明其生死之法中非有耳此意但只明其根塵虗妄本不是有非是絶無為無也此言揀有二義一揀涅槃非有無攝二揀為無之無非二家所計之無
